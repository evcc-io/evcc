name: PR Nightly

# Triggered by a maintainer commenting `/nightly` on a pull request.
# Builds the nightly packages from master (goreleaser snapshot) to check the
# nightly pipeline is green, then replies with the result. No download artifacts.

on:
  issue_comment:
    types: [created]

permissions:
  contents: read

jobs:
  nightly:
    name: Nightly Build
    # only on PR comments starting with /nightly, and only from maintainers
    if: |
      github.event.issue.pull_request &&
      startsWith(github.event.comment.body, '/nightly') &&
      contains(fromJSON('["OWNER", "MEMBER", "COLLABORATOR"]'), github.event.comment.author_association)
    runs-on: depot-ubuntu-24.04-arm
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: React to comment
        uses: actions/github-script@v8
        with:
          script: |
            await github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: context.payload.comment.id,
              content: 'eyes',
            });

      - uses: actions/checkout@v7
        with:
          ref: master
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
        id: go

      - uses: actions/setup-node@v6
        with:
          node-version: "26"
          cache: "npm"

      - name: Build UI
        run: make install-ui ui

      - name: Patch ASN1
        run: make patch-asn1-sudo

      - name: Create nightly build
        uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7
        with:
          version: "~> v2"
          args: --snapshot -f .goreleaser-nightly.yml --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  report:
    name: Report
    needs: nightly
    if: always() && needs.nightly.result != 'skipped'
    runs-on: depot-ubuntu-24.04-arm
    permissions:
      pull-requests: write
    steps:
      - name: Comment result
        uses: actions/github-script@v8
        with:
          script: |
            const num = context.payload.issue.number;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const runUrl = `${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`;
            const ok = '${{ needs.nightly.result }}' === 'success';
            const body = ok
              ? '✅ Nightly build from master finished.'
              : `❌ Nightly build from master failed. See the [run logs](${runUrl}).`;
            await github.rest.issues.createComment({ owner, repo, issue_number: num, body });
