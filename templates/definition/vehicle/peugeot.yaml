template: peugeot
products:
  - brand: Peugeot
requirements:
  description:
    de: |
      Nach dem Anlegen erscheint in der Konfiguration eine Peugeot-Anmeldung.
      Melde dich dort mit deiner MyPeugeot-E-Mail und deinem Passwort an.
    en: |
      After adding the vehicle a Peugeot login appears in the configuration.
      Sign in there with your MyPeugeot email and password.
params:
  - preset: vehicle-common
  - preset: vehicle-online
  - name: user
    deprecated: true
  - name: password
    deprecated: true
  - name: accessToken
    deprecated: true
  - name: refreshToken
    deprecated: true
  - name: vin
    help:
      de: Optional - leer lassen zur automatischen Erkennung (nur bei einem Fahrzeug im Konto; bei mehreren bitte VIN angeben).
      en: Optional - leave empty to auto-detect (only with a single vehicle in the account; set the VIN if you have several).
    example: V...
  - name: cache
    default: 15m
    advanced: true
render: |
  type: peugeot
  vin: {{ .vin }}
  {{ include "vehicle-common" . }}
  cache: {{ .cache }}
  {{ include "vehicle-features" . }}
