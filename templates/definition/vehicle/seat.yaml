template: seat
products:
  - brand: Seat
    description:
      generic: CupraConnect Gen3 (Ateca, Leon, Formentor, Tarraco)
params:
  - preset: vehicle-base
  - name: disablechargingonclimateractive
    advanced: true
render: |
  type: seat
  {{ include "vehicle-base" . }}
  features: 
  {{- if eq .disablechargingonclimateractive "true" }}
  - disablechargingonclimateractive
  {{- end }}
