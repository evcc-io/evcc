template: skoda
covers: ["enyaq"]
products:
  - brand: Skoda
params:
  - preset: vehicle-base
  - name: timeout
  - name: disablechargingonclimateractive
    advanced: true
render: |
  type: skoda
  {{ include "vehicle-base" . }}
  timeout: {{ .timeout }}
  features: 
  {{- if eq .disablechargingonclimateractive "true" }}
  - disablechargingonclimateractive
  {{- end }}
