template: hyundai-us
products:
  - brand: Hyundai
    description:
      generic: Bluelink (US)
params:
  - preset: vehicle-base
  - name: pin
    required: true
    help:
      en: Required by Bluelink (US) to authorize remote commands.
      de: Wird von Bluelink (US) benötigt, um Fernkommandos zu autorisieren.
  - name: disablechargingonclimateractive
    advanced: true
render: |
  type: hyundai-us
  {{ include "vehicle-base" . }}
  pin: {{ quote .pin }}
  features: 
  {{- if eq .disablechargingonclimateractive "true" }}
  - disablechargingonclimateractive
  {{- end }}
