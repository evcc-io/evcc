template: vw
covers: ["id"]
products:
  - brand: Volkswagen
    description:
      generic: EU Data Act
requirements:
  description:
    de: e-Golf, e-Up, ID Familie
    en: e-Golf, e-Up, ID family
params:
  - preset: vehicle-base
  - name: vin
    example: WVWZZZ...
  - name: timeout
    deprecated: true
  - preset: vehicle-features
render: |
  type: drivesomethinggreater
  brand: Volkswagen
  {{ include "vehicle-base" . }}
  {{ include "vehicle-features" (merge (dict "basefeatures" (list "streaming")) .) }}
