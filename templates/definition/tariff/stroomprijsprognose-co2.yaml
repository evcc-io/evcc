template: stroomprijsprognose-co2
products:
  - brand: stroomprijsprognose.nl
requirements:
  description:    
    de: "5 Tage Prognose [stroomprijsprognose.nl](https://stroomprijsprognose.nl/de/evcc-strompreis-co2-prognose/)"
    en: "5 days prognosis [stroomprijsprognose.nl](https://stroomprijsprognose.nl)"
  evcc: ["skiptest"]
group: co2
countries: ["DE", "NL", "BE", "DK"]
params:
  - name: region
    example: DE
    type: choice
    choice: ["DE", "NL", "BE", "DK1", "DK2"]
    required: true
  - name: hours
    default: 120
    type: Int
    description:
      en: Forecast horizon in hours
      de: Prognosehorizont in Stunden
    required: true
render: |
  type: custom
  tariff: co2
  forecast:
    source: http
    uri: https://stroomprijsprognose.nl/api/v1/evcc/tariff?country={{.region}}&type=co2&hours={{.hours}}
