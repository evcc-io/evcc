template: octopus-de
products:
  - brand: Octopus Energy
    description:
      de: Deutschland
      en: Germany
requirements:
  evcc: ["skiptest"]
countries: ["DE"]
group: price
params:
  - name: email
    required: true
  - name: password
    type: string
    required: true
    example: "secret"
    help:
      de: "Das Passwort Ihres Octopus Energy Kontos."
      en: "The password of your Octopus Energy account."
  - name: accountNumber
    type: string
    required: true
    example: "A-XX345678"
    description:
      en: Account Number
      de: Kundennummer
    help:
      de: "Ihre Octopus Energy Kundennummer (z.B. A-12345678)."
      en: "Your Octopus Energy account number (e.g., A-12345678)."
render: |
  type: octopus-de
  accountNumber: {{ .accountNumber }}
  email: {{ .email }}
  password: {{ .password }}
