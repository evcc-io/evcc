template: energypriceforecast
products:
  - brand: Energy Price Forecast EU
    description:
      generic: Predicted spot prices
requirements:
  description:
    de: "Day-Ahead-Strompreise plus 4 Tage Prognose [energypriceforecast.eu](https://energypriceforecast.eu/de/evcc-strompreis-co2-prognose/)"
    en: "Spot prices in day-ahead market plus 4 days prognosis [energypriceforecast.eu](https://energypriceforecast.eu)"
  evcc: ["skiptest"]
group: price
countries: ["DE", "NL", "BE", "DK", "FR"]
params:
  - name: region
    example: DE
    type: choice
    choice: ["DE", "NL", "BE", "DK1", "DK2", "FR"]
    required: true
  - name: currency
    choice: ["EUR", "DKK"]
  - name: horizon
    default: 120
    type: int
    unit: h
    description:
      en: Forecast horizon
      de: Prognosehorizont
    required: true
  - preset: tariff-base
  - preset: tariff-features
render: |
  type: custom
  {{ include "tariff-base" . }}
  {{ include "tariff-features" . }}
  forecast:
    source: http
    uri: https://api.energypriceforecast.eu/api/v1/evcc/tariff?country={{.region}}&type=grid&currency={{.currency}}&hours={{.horizon}}
