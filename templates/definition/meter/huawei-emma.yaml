template: huawei-emma
products:
  - brand: Huawei
    description:
      generic: EMMA
params:
  - name: usage
    choice: ["grid", "pv", "battery"]
  - name: modbus
    choice: ["tcpip"]
  - preset: battery-params
render: |
  type: custom
  {{- if eq .usage "grid" }}
  power:
    source: modbus
    id: 0
    uri: {{ joinHostPort .host .port }}
    register:
      address: 31657 # Active power of built-in electric energy sensor
      type: holding
      decode: int32
  energy:
    source: modbus
    id: 0
    uri: {{ joinHostPort .host .port }}
    register:
      address: 31679 # Total negative active energy of built-in electric energy sensor
      type: holding
      decode: int64
    scale: 0.01
  currents:
  - source: modbus
    id: 0
    uri: {{ joinHostPort .host .port }}
    register:
      address: 31651 # Huawei phase A grid current
      type: holding
      decode: int32
    scale: 0.1
  - source: modbus
    id: 0
    uri: {{ joinHostPort .host .port }}
    register:
      address: 31653 # Huawei phase B grid current
      type: holding
      decode: int32
    scale: 0.1
  - source: modbus
    id: 0
    uri: {{ joinHostPort .host .port }}
    register:
      address: 31655 # Huawei phase C grid current
      type: holding
      decode: int32
    scale: 0.1
  voltages:
  - source: modbus
    id: 0
    uri: {{ joinHostPort .host .port }}
    register:
      address: 31639 # Huawei phase A grid voltage
      type: holding
      decode: uint32
    scale: 0.01
  - source: modbus
    id: 0
    uri: {{ joinHostPort .host .port }}
    register:
      address: 31641 # Huawei phase B grid voltage
      type: holding
      decode: uint32
    scale: 0.01
  - source: modbus
    id: 0
    uri: {{ joinHostPort .host .port }}
    register:
      address: 31643 # Huawei phase C grid voltage
      type: holding
      decode: uint32
    scale: 0.01
  powers:
  - source: modbus
    id: 0
    uri: {{ joinHostPort .host .port }}
    register:
      address: 31665 # Huawei phase A grid power
      type: holding
      decode: int32
  - source: modbus
    id: 0
    uri: {{ joinHostPort .host .port }}
    register:
      address: 31667 # Huawei phase B grid power
      type: holding
      decode: int32
  - source: modbus
    id: 0
    uri: {{ joinHostPort .host .port }}
    register:
      address: 31669 # Huawei phase C grid power
      type: holding
      decode: int32
  {{- end }}
  {{- if eq .usage "pv" }}
  power:
    source: modbus
    id: 0
    uri: {{ joinHostPort .host .port }}
    register:
      address: 30354 # Active power
      type: holding
      decode: int32
  energy:
    source: modbus
    id: 0
    uri: {{ joinHostPort .host .port }}
    register:
      address: 30344 # E-Total
      type: holding
      decode: uint32
    scale: 0.01
  {{- end }}
  {{- if eq .usage "battery" }}
  power:
    source: modbus
    id: 0
    uri: {{ joinHostPort .host .port }}
    register:
      address: 30360
      type: holding
      decode: int32nan
    scale: -1
  energy:
    source: modbus
    id: 0
    uri: {{ joinHostPort .host .port }}
    register:
      address: 30312 # Total discharge
      type: holding
      decode: uint32nan
    scale: 0.01
  soc:
    source: modbus
    id: 0
    uri: {{ joinHostPort .host .port }}
    register:
      address: 30368
      type: holding
      decode: uint16nan
    scale: 0.01
  {{- include "battery-params" . }}
  {{- end }}
