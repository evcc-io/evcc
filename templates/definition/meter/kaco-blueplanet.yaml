template: kaco-blueplanet
products:
  - brand: Kaco
    description:
      generic: Blueplanet NX Series (via http)
params:
  - name: usage
    choice: ["pv"]
  - name: host
    required: true
    description:
      en: The ip the host to query
      de: Der IP des Kaco Wechselrichter
    example: 192.168.0.123    
  - name: sn
    required: true
    description:
      en: The serial number the host to query
      de: Der Serialnummer des Kaco Wechselrichter
    example: 8.0NX312001234
render: |
  type: custom
  power:
    source: http
    uri: http://{{ .host }}/getdevdata.cgi?device=2&sn={{ .sn }}
    jq: .pac
