template: goodwe-wifi-et
requirements:
  evcc: ["skiptest"]
products:
  - brand: GoodWe
    description:
      generic: ET/EH/BT/BH Hybrid Inverter (WiFi)

params:
  - name: usage
    choice: ["grid", "pv", "battery"]

  - name: host
    example: 192.168.1.26

render: |
  type: custom
  {{- if eq .usage "grid" }}
  power:
    source: aa55udp
    host: {{ .host }}
    pdu: "f703891c007d"  # READ 125 @ 0x891C
    offset: 78           # grid power: (35139-35100)*2
    decode: int32be
  energy:
    source: aa55udp
    host: {{ .host }}
    register: 36017
    count: 2
    id: 247
    decode: float32be
    scale: 0.001
  {{- end }}
  {{- if eq .usage "pv" }}
  power:
    source: calc
    add:
    - source: aa55udp
      host: {{ .host }}
      pdu: "f703891c007d"  # READ 125 @ 0x891C
      offset: 10           # Ppv1: (35105-35100)*2
      decode: uint32nan
    - source: aa55udp
      host: {{ .host }}
      pdu: "f703891c007d"
      offset: 18           # Ppv2: (35109-35100)*2
      decode: uint32nan
    - source: aa55udp
      host: {{ .host }}
      pdu: "f703891c007d"
      offset: 26           # Ppv3: (35113-35100)*2
      decode: uint32nan
    - source: aa55udp
      host: {{ .host }}
      pdu: "f703891c007d"
      offset: 34           # Ppv4: (35117-35100)*2
      decode: uint32nan
  energy:
    source: aa55udp
    host: {{ .host }}
    pdu: "f703891c007d"
    offset: 182            # pv energy: (35191-35100)*2
    decode: uint32be
    scale: 0.1
  {{- end }}
  {{- if eq .usage "battery" }}
  power:
    source: aa55udp
    host: {{ .host }}
    pdu: "f703891c007d"  # READ 125 @ 0x891C
    offset: 164           # battery power: (35182-35100)*2
    decode: int32be
  energy:
    source: aa55udp
    host: {{ .host }}
    pdu: "f703891c007d"
    offset: 218           # battery discharge energy: (35209-35100)*2
    decode: uint32be
    scale: 0.1
  soc:
    source: aa55udp
    host: {{ .host }}
    pdu: "f7039088000d"  # READ 13 @ 0x9088
    offset: 14            # soc: (37007-37000)*2
    decode: uint16be
  {{- end }}
