template: goodwe-wifi-et
covers: ["goodwe-wifi"]
requirements:
  evcc: ["skiptest"]
products:
  - brand: GoodWe
    description:
      generic: ET/EH/BT/BH Hybrid Inverter (WiFi)
params:
  - name: usage
    choice: ["grid", "pv", "battery"]
  - name: host
  - name: uri
    deprecated: true
  - name: delay
    type: duration
    default: 0.1s
    advanced: true
render: |
  type: custom
  {{- if eq .usage "grid" }}
  power:
    source: aa55udp
    host: {{ or .host .uri }}
    id: 247
    block:               # READ 125 @ 0x891C
      register: 35100
      count: 125
    register:
      address: 35139     # grid power
      decode: int32
    scale: -1
    delay: {{ .delay }}
  energy:
    source: aa55udp
    host: {{ or .host .uri }}
    id: 247
    register:
      address: 36017
      decode: float32
    scale: 0.001
    delay: {{ .delay }}
  {{- end }}
  {{- if eq .usage "pv" }}
  power:
    source: calc
    add:
    - source: aa55udp
      host: {{ or .host .uri }}
      id: 247
      block:             # READ 125 @ 0x891C
        register: 35100
        count: 125
      register:
        address: 35105   # Ppv1
        decode: uint32nan
      delay: {{ .delay }}
    - source: aa55udp
      host: {{ or .host .uri }}
      id: 247
      block:
        register: 35100
        count: 125
      register:
        address: 35109   # Ppv2
        decode: uint32nan
      delay: {{ .delay }}
    - source: aa55udp
      host: {{ or .host .uri }}
      id: 247
      block:
        register: 35100
        count: 125
      register:
        address: 35113   # Ppv3
        decode: uint32nan
      delay: {{ .delay }}
    - source: aa55udp
      host: {{ or .host .uri }}
      id: 247
      block:
        register: 35100
        count: 125
      register:
        address: 35117   # Ppv4
        decode: uint32nan
      delay: {{ .delay }}
  energy:
    source: aa55udp
    host: {{ or .host .uri }}
    id: 247
    block:
      register: 35100
      count: 125
    register:
      address: 35191     # pv energy
      decode: uint32nan
    scale: 0.1
    delay: {{ .delay }}
  {{- end }}
  {{- if eq .usage "battery" }}
  power:
    source: aa55udp
    host: {{ or .host .uri }}
    id: 247
    block:               # READ 125 @ 0x891C
      register: 35100
      count: 125
    register:
      address: 35182     # battery power
      decode: int32
    delay: {{ .delay }}
  energy:
    source: aa55udp
    host: {{ or .host .uri }}
    id: 247
    block:
      register: 35100
      count: 125
    register:
      address: 35209     # battery discharge energy
      decode: uint32nan
    scale: 0.1
    delay: {{ .delay }}
  soc:
    source: aa55udp
    host: {{ or .host .uri }}
    id: 247
    block:               # READ 13 @ 0x9088
      register: 37000
      count: 13
    register:
      address: 37007     # soc
      decode: uint16nan
    delay: {{ .delay }}
  {{- end }}
