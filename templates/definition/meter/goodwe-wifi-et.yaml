template: goodwe-wifi-et
requirements:
  evcc: ["skiptest"]
products:
  - brand: GoodWe
    description:
      generic: ET/EH/BT/BH Hybrid Inverter (WiFi)

params:
  - name: usage
    choice: ["grid", "pv", "battery"]

  - name: host
    help:
      en: IP address of the inverter (port 8899)
      de: IP-Adresse des Wechselrichters (Port 8899)
    example: 192.168.1.26

render: |
  type: custom
  power:
    source: aa55udp
    host: {{ .host }}
    register: {{ if eq .usage "pv" }}35137{{ else if eq .usage "grid" }}35139{{ else }}35182{{ end }}
    count: 2
    decode: int32be
  {{- if eq .usage "pv" }}
  energy:
    source: aa55udp
    host: {{ .host }}
    register: 35191
    count: 2
    decode: uint32be
    scale: 0.1
  {{- end }}
  {{- if eq .usage "battery" }}
  energy:
    source: aa55udp
    host: {{ .host }}
    register: 35209
    count: 2
    decode: uint32be
    scale: 0.1
  soc:
    source: aa55udp
    host: {{ .host }}
    register: 37007
    count: 1
    decode: uint16be
  {{- end }}
