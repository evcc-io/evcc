template: solplanet-hybrid
products:
  - brand: Solplanet
    description:
      en: ASW-H Hybrid Inverter
      de: ASW-H Hybrid-Wechselrichter
requirements:
  description:
    en: |
      Based on the vendor's [AISWEI Modbus documentation](https://github.com/evcc-io/evcc/discussions/17680) (Solplanet inverters are built by AISWEI).

      **Attention**: users report that the network dongle does not expose Modbus TCP directly (connection refused/reset), only the undocumented HTTP/JSON API on port 8484. Use an RS485 connection (directly or via a serial-to-TCP/USB adapter) unless the dongle's firmware has since added native Modbus TCP support. If only that dongle is used, use the [solplanet-hybrid-http](https://github.com/evcc-io/evcc/blob/master/templates/definition/meter/solplanet-hybrid-http.yaml) template instead.

      Battery charge/discharge control is supported and has been confirmed working against real hardware ([source](https://github.com/evcc-io/evcc/pull/31480#issuecomment-4887359149)).
    de: |
      Basierend auf der [AISWEI Modbus-Dokumentation](https://github.com/evcc-io/evcc/discussions/17680) des Herstellers (Solplanet-Wechselrichter werden von AISWEI gefertigt).

      **Achtung**: Nutzer berichten, dass der Netzwerk-Dongle kein Modbus TCP anbietet (Verbindung wird abgelehnt/zurückgesetzt), sondern nur die undokumentierte HTTP/JSON-API auf Port 8484. Eine RS485-Verbindung verwenden (direkt oder über einen Seriell-zu-TCP/USB-Adapter), außer die Firmware des Dongles unterstützt inzwischen natives Modbus TCP. Falls nur dieser Dongle verwendet wird, stattdessen das [solplanet-hybrid-http](https://github.com/evcc-io/evcc/blob/master/templates/definition/meter/solplanet-hybrid-http.yaml)-Template verwenden.

      Die Batterie-Lade-/Entladesteuerung wird unterstützt und wurde an echter Hardware verifiziert ([Quelle](https://github.com/evcc-io/evcc/pull/31480#issuecomment-4887359149)).
  evcc: ["skiptest"]
capabilities: ["battery-control"]
params:
  - name: usage
    choice: ["grid", "pv", "battery"]
  - name: modbus
    choice: ["rs485"]
  - preset: battery-params
  - name: maxchargepower
    required: true
    example: 5000
  - name: maxdischargepower
    required: true
    example: 5000
  - name: minsoc
    default: 10
  - name: maxsoc
    default: 100
render: |
  type: custom
  {{- if eq .usage "grid" }}
  power:
    source: modbus
    {{- include "modbus" . | indent 2 }}
    connectdelay: 1s
    register:
      address: 35016 # Total system power (S32, W)
      type: holding
      decode: int32
    block: # 35001-35021
      register: 35001
      count: 21
  energy:
    source: modbus
    {{- include "modbus" . | indent 2 }}
    register:
      address: 35018 # Import Wh since last reset (U32, 0.1 kWh)
      type: holding
      decode: uint32
    block: # 35001-35021
      register: 35001
      count: 21
    scale: 0.1
  returnenergy:
    source: modbus
    {{- include "modbus" . | indent 2 }}
    register:
      address: 35020 # Export Wh since last reset (U32, 0.1 kWh)
      type: holding
      decode: uint32
    block: # 35001-35021
      register: 35001
      count: 21
    scale: 0.1
  currents:
  - source: modbus
    {{- include "modbus" . | indent 2 }}
    register:
      address: 35005 # Phase 1 current (U16, 0.1 A)
      type: holding
      decode: uint16
    block: # 35001-35021
      register: 35001
      count: 21
    scale: 0.1
  - source: modbus
    {{- include "modbus" . | indent 2 }}
    register:
      address: 35006 # Phase 2 current (U16, 0.1 A)
      type: holding
      decode: uint16
    block: # 35001-35021
      register: 35001
      count: 21
    scale: 0.1
  - source: modbus
    {{- include "modbus" . | indent 2 }}
    register:
      address: 35007 # Phase 3 current (U16, 0.1 A)
      type: holding
      decode: uint16
    block: # 35001-35021
      register: 35001
      count: 21
    scale: 0.1
  voltages:
  - source: modbus
    {{- include "modbus" . | indent 2 }}
    register:
      address: 35001 # Phase 1 line to neutral volts (U16, 0.1 V)
      type: holding
      decode: uint16
    block: # 35001-35021
      register: 35001
      count: 21
    scale: 0.1
  - source: modbus
    {{- include "modbus" . | indent 2 }}
    register:
      address: 35002 # Phase 2 line to neutral volts (U16, 0.1 V)
      type: holding
      decode: uint16
    block: # 35001-35021
      register: 35001
      count: 21
    scale: 0.1
  - source: modbus
    {{- include "modbus" . | indent 2 }}
    register:
      address: 35003 # Phase 3 line to neutral volts (U16, 0.1 V)
      type: holding
      decode: uint16
    block: # 35001-35021
      register: 35001
      count: 21
    scale: 0.1
  {{- end }}
  {{- if eq .usage "pv" }}
  power:
    source: modbus
    {{- include "modbus" . | indent 2 }}
    connectdelay: 1s
    register:
      address: 31601 # PV total power (U32, W)
      type: holding
      decode: uint32
    block: # 31601-31606
      register: 31601
      count: 6
  energy:
    source: modbus
    {{- include "modbus" . | indent 2 }}
    register:
      address: 31605 # PV E-Total (U32, 0.1 kWh)
      type: holding
      decode: uint32
    block: # 31601-31606
      register: 31601
      count: 6
    scale: 0.1
  {{- end }}
  {{- if eq .usage "battery" }}
  power:
    source: modbus
    {{- include "modbus" . | indent 2 }}
    connectdelay: 1s
    register:
      address: 31619 # BMS1 battery power (S32, W, sign convention unverified)
      type: holding
      decode: int32
    block: # 31617-31622
      register: 31617
      count: 6
  soc:
    source: modbus
    {{- include "modbus" . | indent 2 }}
    register:
      address: 31622 # BMS1 battery SOC (U16, 0.01 %)
      type: holding
      decode: uint16
    block: # 31617-31622
      register: 31617
      count: 6
    scale: 0.01
  batterymode:
    source: switch
    switch:
    - case: 1 # normal
      set:
        source: const
        value: 2 # normal operation
        set:
          source: modbus
          {{- include "modbus" . | indent 8 }}
          register:
            address: 1103 # battery power control mode
            type: writesingle
            decode: uint16
    - case: 2 # hold
      set:
        source: sequence
        set:
        - source: const
          value: 4 # manual power control
          set:
            source: modbus
            {{- include "modbus" . | indent 10 }}
            register:
              address: 1103 # battery power control mode
              type: writesingle
              decode: uint16
        - source: const
          value: 0 # setpoint 0 W
          set:
            source: modbus
            {{- include "modbus" . | indent 10 }}
            register:
              address: 1152 # battery power setpoint, W, positive discharge/negative charge
              type: writesingle
              decode: int16
    - case: 3 # charge
      set:
        source: sequence
        set:
        - source: const
          value: 4 # manual power control
          set:
            source: modbus
            {{- include "modbus" . | indent 10 }}
            register:
              address: 1103 # battery power control mode
              type: writesingle
              decode: uint16
        - source: const
          value: -{{ .maxchargepower }} # negative setpoint charges
          set:
            source: modbus
            {{- include "modbus" . | indent 10 }}
            register:
              address: 1152 # battery power setpoint, W, positive discharge/negative charge
              type: writesingle
              decode: int16
  {{- include "battery-params" . }}
  {{- end }}
