template: zendure-solarflow-pro
capabilities: ["battery-control"]
products:
  - brand: Zendure
    description:
      generic: Solarflow 800 Pro
params:
  - name: usage
    choice: ["pv", "battery"]
  - name: host
  - name: serial
    required: true
    description:
      de: Seriennummer des Geräts
      en: Device serial number
    help:
      de: "Zu finden in der Zendure App in den Einstellungen des Geräts"
      en: "You can find this in the Zendure App in the settings of the device"
  - name: maxacpower
    default: 800 # W
  - preset: battery-params
  - name: maxdischargepower
    default: 800 # W
  - name: capacity
    default: 1.92 # kWh
  - name: cache
    advanced: true
    default: 1s
render: |
  type: custom
  {{- if eq .usage "pv" }}
  power:
    source: http
    uri: http://{{ .host }}/properties/report
    jq: .properties.solarInputPower
    cache: {{ .cache }}
  maxacpower: {{ .maxacpower }}
  {{- end }}
  {{- if eq .usage "battery" }}
  power:
    source: http
    uri: http://{{ .host }}/properties/report
    jq: .properties.packInputPower - .properties.outputPackPower
    cache: {{ .cache }}
  soc:
    source: http
    uri: http://{{ .host }}/properties/report
    jq: .properties.electricLevel
    cache: {{ .cache }}
  batterymode:
    source: switch
    switch:
    - case: 1 # normal
      set:
        source: http
        uri: http://{{ .host }}/properties/write
        method: POST
        headers:
        - content-type: application/json
        body: '{"sn":"{{ .serial }}","properties":{"outputLimit":{{ .maxdischargepower }}}}'
    - case: 2 # hold
      set:
        source: http
        uri: http://{{ .host }}/properties/write
        method: POST
        headers:
        - content-type: application/json
        body: '{"sn":"{{ .serial }}","properties":{"outputLimit":0}}'
    - case: 3 # charge
      set:
        source: http
        uri: http://{{ .host }}/properties/write
        method: POST
        headers:
        - content-type: application/json
        body: '{"sn":"{{ .serial }}","properties":{"outputLimit":0}}'
  {{- include "battery-params" . }}
  {{- end }}
