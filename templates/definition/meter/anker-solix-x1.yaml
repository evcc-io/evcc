template: anker-solix-x1
products:
  - brand: Anker
    description:
      generic: SOLIX X1 Hybrid Inverter
requirements:
  description:
    de: |
      Die Modbus-TCP-Schnittstelle muss in der Anker-App freigeschaltet werden.
    en: |
      The Modbus TCP interface must be enabled in the Anker app.
params:
  - name: usage
    choice: ["grid", "pv", "battery"]
  - name: modbus
    choice: ["tcpip"]
    port: 502
    id: 1
  - name: maxacpower
  - name: energyscale
    default: 0.01
    advanced: true
    description:
      de: Skalierungsfaktor Energieregister
      en: Energy register scale factor
    help:
      de: kWh pro LSB der kumulativen Energieregister (PV, Batterieentladung, Netzbezug). X1-Firmware nutzt 0.01.
      en: kWh per LSB of the cumulative energy registers (PV, battery discharge, grid import). X1 firmware uses 0.01.
  - preset: battery-params
render: |
  type: custom
  {{- if eq .usage "grid" }}
  power:
    source: modbus
    {{- include "modbus" . | indent 2 }}
    register:
      address: 10644 # Meter Total Active Power (W, positive = import, negative = export)
      type: input
      decode: int32s
  energy:
    source: modbus
    {{- include "modbus" . | indent 2 }}
    register:
      address: 10656 # Meter Total Forward Active Energy (0.01 kWh/LSB on X1 firmware)
      type: input
      decode: uint32s
    scale: {{ .energyscale }}
  powers:
    - source: modbus
      {{- include "modbus" . | indent 4 }}
      register:
        address: 10638 # Meter Phase A Active Power
        type: input
        decode: int32s
    - source: modbus
      {{- include "modbus" . | indent 4 }}
      register:
        address: 10640 # Meter Phase B Active Power
        type: input
        decode: int32s
    - source: modbus
      {{- include "modbus" . | indent 4 }}
      register:
        address: 10642 # Meter Phase C Active Power
        type: input
        decode: int32s
  currents:
    - source: modbus
      {{- include "modbus" . | indent 4 }}
      register:
        address: 10635 # Meter Phase A Current
        type: input
        decode: uint16
      scale: 0.01
    - source: modbus
      {{- include "modbus" . | indent 4 }}
      register:
        address: 10636 # Meter Phase B Current
        type: input
        decode: uint16
      scale: 0.01
    - source: modbus
      {{- include "modbus" . | indent 4 }}
      register:
        address: 10637 # Meter Phase C Current
        type: input
        decode: uint16
      scale: 0.01
  voltages:
    - source: modbus
      {{- include "modbus" . | indent 4 }}
      register:
        address: 10632 # Meter Phase A Voltage
        type: input
        decode: uint16
      scale: 0.1
    - source: modbus
      {{- include "modbus" . | indent 4 }}
      register:
        address: 10633 # Meter Phase B Voltage
        type: input
        decode: uint16
      scale: 0.1
    - source: modbus
      {{- include "modbus" . | indent 4 }}
      register:
        address: 10634 # Meter Phase C Voltage
        type: input
        decode: uint16
      scale: 0.1
  {{- end }}
  {{- if eq .usage "pv" }}
  power:
    source: modbus
    {{- include "modbus" . | indent 2 }}
    register:
      address: 10183 # Total PV Power (W)
      type: input
      decode: int32s
  energy:
    # total PV generation: firmware exposes it on either 10187 or 10189 (the other
    # reads 0), so sum both to cover all firmware without a user-facing option
    source: calc
    add:
      - source: modbus
        {{- include "modbus" . | indent 6 }}
        register:
          address: 10187 # Total PV Generation (0.01 kWh/LSB)
          type: input
          decode: uint32s
        scale: {{ .energyscale }}
      - source: modbus
        {{- include "modbus" . | indent 6 }}
        register:
          address: 10189 # Total PV Generation (alt firmware mapping; 0 otherwise)
          type: input
          decode: uint32s
        scale: {{ .energyscale }}
  maxacpower: {{ .maxacpower }}
  {{- end }}
  {{- if eq .usage "battery" }}
  power:
    source: modbus
    {{- include "modbus" . | indent 2 }}
    register:
      address: 10008 # Battery Power (W, positive = discharging, negative = charging)
      type: input
      decode: int32s
  energy:
    source: modbus
    {{- include "modbus" . | indent 2 }}
    register:
      address: 10264 # Battery Total Discharge Energy (0.01 kWh/LSB on X1 firmware)
      type: input
      decode: uint32s
    scale: {{ .energyscale }}
  soc:
    source: modbus
    {{- include "modbus" . | indent 2 }}
    register:
      address: 10014 # SOC (%)
      type: input
      decode: uint16
  {{- include "battery-params" . }}
  {{- end }}
