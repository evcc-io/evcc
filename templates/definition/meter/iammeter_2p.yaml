template: iammeter_2p
products:
  - brand: IAMMETER
    description:
      generic: WEM2067
params:
  - name: usage
    choice: ["grid", "pv", "charge"]
  - name: host
  - name: channel
    type: int
    default: 1
    required: true
    description:
      de: Messkanal (1-2)
      en: Meter channel (1-2)
render: |
  type: custom
  {{- $idx := sub .channel 1 }}
  power:
    source: http
    uri: http://{{ .host }}/api/monitorjson
    jq: .Datas[{{ $idx }}][2]
    cache: 2s
  energy:
    source: http
    uri: http://{{ .host }}/api/monitorjson
    jq: .Datas[{{ $idx }}][3]
    cache: 2s
  voltages:
  - source: http
    uri: http://{{ .host }}/api/monitorjson
    jq: .Datas[{{ $idx }}][0]
    cache: 2s
  - source: const
    value: 0
  - source: const
    value: 0
  currents:
  - source: http
    uri: http://{{ .host }}/api/monitorjson
    jq: .Datas[{{ $idx }}][1]
    cache: 2s
  - source: const
    value: 0
  - source: const
    value: 0
