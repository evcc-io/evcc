template: quatt
products:
  - brand: Quatt
    description:
      generic: Hybrid Heat Pump
group: heating
params:
  - name: usage
    choice: ["aux"]
  - name: host
  - name: port
    default: 8080
render: |
  type: custom
  power:
    source: http
    uri: http://{{ .host }}:{{ .port }}/beta/feed/data.json
    jq: ((.hp1.powerInput // 0) + (.hp2.powerInput // 0)) * 1000
