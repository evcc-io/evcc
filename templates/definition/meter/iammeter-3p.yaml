template: iammeter-3p
products:
  - brand: IAMMETER
    description:
      generic: WEM3080T
  - brand: IAMMETER
    description:
      generic: WEM3046T
  - brand: IAMMETER
    description:
      generic: WEM3050T
requirements:
  description:
    de: |
      Die Aktivierung des Net Metering Mode (NEM) (=phasensaldierende Zählung) ist erforderlich.
      Siehe https://www.iammeter.com/newsshow/net-energy-metering
    en: |
      Net Metering Mode (NEM) must be enabled.
      See https://www.iammeter.com/newsshow/net-energy-metering
params:
  - name: usage
    choice: ["grid", "pv", "charge"]
  - name: host
  - name: cache
    advanced: true
    default: 2s
render: |
  type: custom
  power:
    source: http
    uri: http://{{ .host }}/api/monitorjson
    jq: .Datas[3][2] # active power, unit: W
    cache: {{ .cache }}
    {{- if eq .usage "pv" }}
    scale: -1
    {{- end }}
  energy:
    source: http
    uri: http://{{ .host }}/api/monitorjson
    {{- if eq .usage "pv" }}
    jq: .Datas[3][4] # reverse active energy, unit: kWh
    {{- else }}
    jq: .Datas[3][3] # forward active energy, unit: kWh
    {{- end }}
    cache: {{ .cache }}
  powers:
  - source: http
    uri: http://{{ .host }}/api/monitorjson
    jq: .Datas[0][2] # L1 power, unit: W
    cache: {{ .cache }}
    {{- if eq .usage "pv" }}
    scale: -1
    {{- end }}
  - source: http
    uri: http://{{ .host }}/api/monitorjson
    jq: .Datas[1][2] # L2 power, unit: W
    cache: {{ .cache }}
    {{- if eq .usage "pv" }}
    scale: -1
    {{- end }}
  - source: http
    uri: http://{{ .host }}/api/monitorjson
    jq: .Datas[2][2] # L3 power, unit: W
    cache: {{ .cache }}
    {{- if eq .usage "pv" }}
    scale: -1
    {{- end }}
  currents:
  - source: http
    uri: http://{{ .host }}/api/monitorjson
    jq: .Datas[0][1] # L1 current, unit: A
    cache: {{ .cache }}
  - source: http
    uri: http://{{ .host }}/api/monitorjson
    jq: .Datas[1][1] # L2 current, unit: A
    cache: {{ .cache }}
  - source: http
    uri: http://{{ .host }}/api/monitorjson
    jq: .Datas[2][1] # L3 current, unit: A
    cache: {{ .cache }}
  voltages:
  - source: http
    uri: http://{{ .host }}/api/monitorjson
    jq: .Datas[0][0] # L1 voltage, unit: V
    cache: {{ .cache }}
  - source: http
    uri: http://{{ .host }}/api/monitorjson
    jq: .Datas[1][0] # L2 voltage, unit: V
    cache: {{ .cache }}
  - source: http
    uri: http://{{ .host }}/api/monitorjson
    jq: .Datas[2][0] # L3 voltage, unit: V
    cache: {{ .cache }}
