template: homeassistant
products:
  - brand: Home Assistant
group: generic
requirements:
  description:
    en: Home Assistant instances in your network will be auto-discovered and suitable entities (e.g. `sensor.*`) will be suggested.
    de: Home Assistant Instanzen in deinem Netzwerk werden automatisch erkannt und passende Entitäten (z.B. `sensor.*`) werden vorgeschlagen.
auth:
  type: homeassistant
  params: [uri]
params:
  - name: usage
    choice: ["grid", "pv", "battery", "aux", "charge"]
  - name: uri
    description:
      de: Home Assistant URI
      en: Home Assistant URI
    example: http://homeassistant.local:8123
    help:
      en: " " # overwrite default
      de: " " # overwrite default
    service: homeassistant/instances
    required: true
  - name: token
    deprecated: true
  - name: home
    deprecated: true
  - name: power
    description:
      de: Leistungsentität
      en: Power Entity
    required: true
    service: homeassistant/entities?uri={uri}&domain=sensor
    example: "sensor.house_power"
    help:
      en: Entity ID for instantaneous power measurement in watts. The entity must provide numeric values only (e.g., "1234", not "1234 W").
      de: Entitäts-ID für momentane Leistungsmessung in Watt. Die Entität muss nur numerische Werte liefern (z.B. "1234", nicht "1234 W").
  - name: energy
    description:
      de: Energieentität
      en: Energy Entity
    service: homeassistant/entities?uri={uri}&domain=sensor
    example: "sensor.house_energy"
    advanced: true
    help:
      en: Entity ID for cumulative energy measurement in kWh. Should provide total energy consumed/produced, not daily or interval values.
      de: Entitäts-ID für kumulative Energiemessung in kWh. Sollte die gesamte verbrauchte/produzierte Energie liefern, nicht tägliche oder Intervallwerte.
  - name: currentL1
    description:
      de: L1 Stromentität
      en: L1 Current Entity
    service: homeassistant/entities?uri={uri}&domain=sensor
    example: "sensor.house_current_l1"
    advanced: true
    help:
      en: Entity ID for L1 current measurement in amperes
      de: Entitäts-ID für L1 Strommessung in Ampere
  - name: currentL2
    description:
      de: L2 Stromentität
      en: L2 Current Entity
    service: homeassistant/entities?uri={uri}&domain=sensor
    example: "sensor.house_current_l2"
    advanced: true
    help:
      en: Entity ID for L2 current measurement in amperes
      de: Entitäts-ID für L2 Strommessung in Ampere
  - name: currentL3
    description:
      de: L3 Stromentität
      en: L3 Current Entity
    service: homeassistant/entities?uri={uri}&domain=sensor
    example: "sensor.house_current_l3"
    advanced: true
    help:
      en: Entity ID for L3 current measurement in amperes
      de: Entitäts-ID für L3 Strommessung in Ampere
  - name: voltageL1
    description:
      de: L1 Spannungsentität
      en: L1 Voltage Entity
    service: homeassistant/entities?uri={uri}&domain=sensor
    example: "sensor.house_voltage_l1"
    advanced: true
    help:
      en: Entity ID for L1 voltage measurement in volts
      de: Entitäts-ID für L1 Spannungsmessung in Volt
  - name: voltageL2
    description:
      de: L2 Spannungsentität
      en: L2 Voltage Entity
    service: homeassistant/entities?uri={uri}&domain=sensor
    example: "sensor.house_voltage_l2"
    advanced: true
    help:
      en: Entity ID for L2 voltage measurement in volts
      de: Entitäts-ID für L2 Spannungsmessung in Volt
  - name: voltageL3
    description:
      de: L3 Spannungsentität
      en: L3 Voltage Entity
    service: homeassistant/entities?uri={uri}&domain=sensor
    example: "sensor.house_voltage_l3"
    advanced: true
    help:
      en: Entity ID for L3 voltage measurement in volts
      de: Entitäts-ID für L3 Spannungsmessung in Volt
  - name: soc
    usages: ["battery"]
    description:
      de: Batterieladestand
      en: Battery State of Charge
    service: homeassistant/entities?uri={uri}&domain=sensor
    example: "sensor.battery_soc"
    advanced: true
    help:
      en: Entity ID for battery state of charge in percent
      de: Entitäts-ID für Batterieladestand in Prozent
  - name: modeNormal
    usages: ["battery"]
    description:
      de: Normalbetrieb Entität
      en: Normal Mode Entity
    service: homeassistant/entities?uri={uri}&domain=switch,input_boolean,button,scene,script
    example: "switch.battery_normal"
    advanced: true
    help:
      en: Entity that evcc triggers when the home battery should return to normal operation. Required when modeHold or modeCharge is set. The entity itself is responsible for any necessary state changes on the HA side.
      de: Entität, die evcc auslöst, wenn die Heimbatterie in den Normalbetrieb zurückkehren soll. Erforderlich, wenn modeHold oder modeCharge gesetzt ist. Die Entität selbst ist verantwortlich für alle notwendigen Statusänderungen auf der HA-Seite.
  - name: modeHold
    usages: ["battery"]
    description:
      de: Halten Entität
      en: Hold Mode Entity
    service: homeassistant/entities?uri={uri}&domain=switch,input_boolean,button,scene,script
    example: "switch.battery_hold"
    advanced: true
    help:
      en: Optional entity that evcc triggers to prevent the home battery from charging or discharging.
      de: Optionale Entität, die evcc auslöst, um Laden und Entladen der Heimbatterie zu verhindern.
  - name: modeCharge
    usages: ["battery"]
    description:
      de: Netzladung Entität
      en: Grid Charge Mode Entity
    service: homeassistant/entities?uri={uri}&domain=switch,input_boolean,button,scene,script
    example: "switch.battery_grid_charge"
    advanced: true
    help:
      en: Optional entity that evcc triggers to grid-charge the home battery (e.g. during low-tariff windows).
      de: Optionale Entität, die evcc auslöst, um die Heimbatterie aus dem Netz zu laden (z.B. bei günstigem Tarif).
  - name: maxacpower
  - preset: battery-params
render: |
  type: homeassistant
  uri: {{ .uri }}
  home: {{ .home }} # deprecated
  power: {{ .power }}
  energy: {{ .energy }}
  currents:
    - {{ .currentL1 }}
    - {{ .currentL2 }}
    - {{ .currentL3 }}
  voltages:
    - {{ .voltageL1 }}
    - {{ .voltageL2 }}
    - {{ .voltageL3 }}
  maxacpower: {{ .maxacpower }} # W
  {{- if eq .usage "battery" }}
  soc: {{ .soc }} # W
  modeNormal: {{ .modeNormal }}
  modeHold: {{ .modeHold }}
  modeCharge: {{ .modeCharge }}
  {{- include "battery-params" . }}
  {{- end }}
