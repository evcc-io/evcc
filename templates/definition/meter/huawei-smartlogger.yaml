template: huawei-smartlogger
products:
  - brand: Huawei
    description:
      generic: SmartLogger
capabilities: ["battery-control", "curtail", "dim"]
params:
  - name: usage
    choice: ["grid", "pv", "battery"]
  - name: modbus
    choice: ["tcpip"]
  - name: maxacpower
  - name: storageunit
  - preset: battery-params
  - name: timeout
    deprecated: true
render: |
  type: custom
  {{- if eq .usage "grid" }}
  power:
    source: modbus
    {{- include "modbus" . | indent 2 }}
    connectdelay: 1s
    register:
      address: 32278 # Active power
      type: holding
      decode: int32
    scale: 1
  energy:
    source: modbus
    {{- include "modbus" . | indent 2 }}
    register:
      address: 32349 # Negative active electricity
      type: holding
      decode: int64
    scale: 0.01
  currents:
  - source: modbus
    {{- include "modbus" . | indent 2 }}
    register:
      address: 32272 # Huawei phase A grid current
      type: holding
      decode: int32
    scale: 0.1
  - source: modbus
    {{- include "modbus" . | indent 2 }}
    register:
      address: 32274 # Huawei phase B grid current
      type: holding
      decode: int32
    scale: 0.1
  - source: modbus
    {{- include "modbus" . | indent 2 }}
    register:
      address: 32276 # Huawei phase C grid current
      type: holding
      decode: int32
    scale: 0.1
  {{- end }}
  {{- if eq .usage "pv" }}
  power:
    source: modbus
    id: 0
    uri: {{ joinHostPort .host .port }}
    register:
      address: 40521 # Active power
      type: holding
      decode: int32
  energy:
    source: modbus
    id: 0
    uri: {{ joinHostPort .host .port }}
    register:
      address: 40560 # E-Total
      type: holding
      decode: uint32
    scale: 0.1
  maxacpower: {{ .maxacpower }}
  # curtailment registers live on the SmartLogger (Unit ID 0), which distributes
  # the limit to all connected inverters - same registers as the SUN2000
  curtail:
    source: sequence
    set:
    # allowed feed-in power as percent of nominal (0-100 %)
    - source: modbus
      id: 0
      uri: {{ joinHostPort .host .port }}
      register:
        address: 47418 # Maximum Feed Grid Power (0-100 %)
        type: writesingle
        encoding: uint16
      scale: 10
    # active power control mode: 7 = percentage limit while curtailed, 0 = unlimited at 100%
    - source: switch
      switch:
        - case: 100 # uncurtailed
          set:
            source: const
            value: 0 # Unlimited
            set:
              source: modbus
              id: 0
              uri: {{ joinHostPort .host .port }}
              register:
                address: 47415 # Active power control mode
                type: writesingle
                encoding: uint16
      default:
        source: const
        value: 7 # Power-limited grid connection (%)
        set:
          source: modbus
          id: 0
          uri: {{ joinHostPort .host .port }}
          register:
            address: 47415 # Active power control mode
            type: writesingle
            encoding: uint16
  curtailed:
    source: go
    in:
    - name: mode
      type: int
      config:
        source: modbus
        id: 0
        uri: {{ joinHostPort .host .port }}
        register:
          address: 47415 # Active power control mode (0=no curtailment)
          type: holding
          decode: uint16
    - name: percent
      type: int
      config:
        source: modbus
        id: 0
        uri: {{ joinHostPort .host .port }}
        register:
          address: 47418 # Maximum Feed Grid Power (0-100 %)
          type: holding
          decode: uint16
        scale: 0.1
    # mode 7 (percentage limit) at 100% means limited-grid-connection is enabled but not actually curtailing
    script: mode != 0 && !(mode == 7 && percent == 100)
  {{- end }}
  {{- if eq .usage "battery" }}
  power:
    source: modbus
    {{- include "modbus" . | indent 2 }}
    connectdelay: 1s
    register:
      {{- if eq .storageunit "1" }}
      address: 37001
      {{- end }}
      {{- if eq .storageunit "2" }}
      address: 37743
      {{- end }}
      type: holding
      decode: int32nan
    scale: -1
  energy:
    source: modbus
    {{- include "modbus" . | indent 2 }}
    register:
      {{- if eq .storageunit "1" }}
      address: 37068 # [Energy storage unit 1] Total discharge
      {{- end }}
      {{- if eq .storageunit "2" }}
      address: 37755 # [Energy storage unit 2] Total discharge
      {{- end }}
      type: holding
      decode: uint32nan
    scale: 0.01
  soc:
    source: modbus
    {{- include "modbus" . | indent 2 }}
    register:
      {{- if eq .storageunit "1" }}
      address: 37004
      {{- end }}
      {{- if eq .storageunit "2" }}
      address: 37738
      {{- end }}
      type: holding
      decode: uint16nan
    scale: 0.1
  batterymode:
    source: watchdog
    timeout: 30s
    reset: 1 # reset watchdog on normal
    set:
      source: switch
      switch:
      - case: 1 # normal
        set:
          source: const
          value: 0 # stop
          set:
            source: modbus
            {{- include "modbus" . | indent 10 }}
            register:
              address: 47100 # Forcible charge/discharge
              type: writesingle
              encoding: uint16
      - case: 2 # hold
        set:
          source: sequence
          set:
          - source: const
            value: 2 # discharge
            set:
              source: modbus
              {{- include "modbus" . | indent 12 }}
              register:
                address: 47100 # Forcible charge/discharge
                type: writesingle
                encoding: uint16
          - source: const
            value: 0 # duration
            set:
              source: modbus
              {{- include "modbus" . | indent 12 }}
              register:
                address: 47246 # Forcible charge/discharge setting mode
                type: writesingle
                encoding: uint16
          - source: const
            value: 1 # Minute
            set:
              source: modbus
              {{- include "modbus" . | indent 12 }}
              register:
                address: 47083 # Forced charging and discharging period
                type: writesingle
                encoding: uint16
          - source: const
            value: 0 # W
            set:
              source: modbus
              {{- include "modbus" . | indent 12 }}
              register:
                address: 47249 # Forcible discharge power
                type: writemultiple
                encoding: uint32
      - case: 3 # charge
        set:
          source: sequence
          set:
          - source: const
            value: 1 # charge
            set:
              source: modbus
              {{- include "modbus" . | indent 12 }}
              register:
                address: 47100 # Forcible charge/discharge
                type: writesingle
                encoding: uint16
          - source: const
            value: 0 # duration
            set:
              source: modbus
              {{- include "modbus" . | indent 12 }}
              register:
                address: 47246 # Forcible charge/discharge setting mode
                type: writesingle
                encoding: uint16
          - source: const
            value: 1 # Minute
            set:
              source: modbus
              {{- include "modbus" . | indent 12 }}
              register:
                address: 47083 # Forced charging and discharging period
                type: writesingle
                encoding: uint16
          - source: const
            value: 2500 # W
            set:
              source: modbus
              {{- include "modbus" . | indent 12 }}
              register:
                address: 47247 # Forcible charge power
                type: writemultiple
                encoding: uint32
          - source: const
            value: 1 # Enable
            set:
              source: modbus
              {{- include "modbus" . | indent 12 }}
              register:
                address: 47087 # Charge from grid
                type: writesingle
                encoding: uint16
  {{- include "battery-params" . }}
  {{- end }}
