template: ecoflow-stream
products:
  - brand: EcoFlow
    description:
      generic: Stream
requirements:
  description:
    de: |
      Für die Nutzung des EcoFlow Stream Meters benötigen Sie:
      - Einen gültigen Access Key von der EcoFlow Developer Console
      - Den entsprechenden Secret Key
      - Die Seriennummer des Hauptgerätes Ihres Stream Systems

      Diese Credentials erhalten Sie über die EcoFlow Developer Console nach der Registrierung Ihrer Anwendung.
    en: |
      To use the EcoFlow Stream meter you need:
      - A valid Access Key from the EcoFlow Developer Console
      - The corresponding Secret Key
      - The main device serial number of your Stream system

      These credentials can be obtained through the EcoFlow Developer Console after registering your application.
params:
  - name: usage
    choice: ["grid", "pv", "battery"]
  - name: accesskey
    required: true
    description:
      generic: Access Key
    help:
      en: Access Key from EcoFlow Developer Console
      de: Access Key aus der EcoFlow Developer Console
  - name: secretkey
    required: true
    description:
      generic: Secret Key
    help:
      en: Secret Key from EcoFlow Developer Console
      de: Secret Key aus der EcoFlow Developer Console
  - name: serial
    required: true
    help:
      en: Serial of your main EcoFlow Stream device (e.g., BK51ZE1B2H4H0029)
      de: Seriennummer Ihres EcoFlow Stream Hauptgerätes (z.B. BK51ZE1B2H4H0029)
  - name: cache
    default: 30s
    advanced: true
  - name: region
    choice: ["auto", "europe", "america"]
    default: auto
    description:
      generic: 'API Region: auto (default), europe, or america.'
    help:
      en: 'If you sometimes see an error "8513: accessKey is invalid", which for example Starlink users do, you can set API region explicitly. Passible values: auto (default), europe, or america.'
      de: 'Manche Nutzer, z.B. mit Starlink-Internet, sehen in den Logs den "Fehler 8513: accessKey is invalid". Um das zu beheben, kann man die API Region manuell setzen. Mögliche Werte: auto (Standard), europe oder america.'
render: |
  type: ecoflow-stream
  accesskey: {{ .accesskey }}
  secretkey: {{ .secretkey }}
  serial: {{ .serial }}
  usage: {{ .usage }}
  cache: {{ .cache }}
  region: {{ .region }}
