template: marstek-venus-d
products:
  - brand: Marstek
    description:
      generic: Venus D
      en: Venus D Battery Storage with integrated PV (MPPT)
      de: Venus D Batteriespeicher mit integrierter PV (MPPT)
capabilities: ["battery-control"]
params:
  - name: usage
    choice: ["pv", "battery"]
  - name: modbus
    choice: ["rs485", "tcpip"]
    baudrate: 115200
    comset: 8N1
  - preset: battery-params
    usages: ["battery"]
  - name: capacity
    default: 2.56
    usages: ["battery"]
    help:
      de: Basisgerät 2.56 kWh, jede Erweiterung zzgl. 2.56 kWh
      en: Base unit 2.56 kWh, each extension plus 2.56 kWh
  - name: minsoc
    default: 11
    usages: ["battery"]
  - name: maxsoc
    default: 100
    usages: ["battery"]
  - name: maxchargepower
    default: 2200
    usages: ["battery"]
  - name: work_mode_normal
    default: 1
    advanced: true
    usages: ["battery"]
    description:
      en: Work mode for Normal state
      de: Work mode für Normal-Modus
    help:
      en: 0=manual, 1=anti-feed, 2=trade mode.
      de: 0=manuell, 1=Eigenverbrauch, 2=AI-Optimierung.
render: |
  type: custom
  {{- if eq .usage "pv" }}
  power:
    source: calc
    add:
    - source: modbus
      {{- include "modbus" . | indent 4 }}
      register:
        address: 30037 # MPPT1 power
        type: holding
        decode: uint16
      scale: 0.1
    - source: modbus
      {{- include "modbus" . | indent 4 }}
      register:
        address: 30038 # MPPT2 power
        type: holding
        decode: uint16
      scale: 0.1
    - source: modbus
      {{- include "modbus" . | indent 4 }}
      register:
        address: 30039 # MPPT3 power
        type: holding
        decode: uint16
      scale: 0.1
    - source: modbus
      {{- include "modbus" . | indent 4 }}
      register:
        address: 30040 # MPPT4 power
        type: holding
        decode: uint16
      scale: 0.1
  {{- end }}
  {{- if eq .usage "battery" }}
  power:
    source: calc
    add:
    - source: modbus
      {{- include "modbus" . | indent 4 }}
      register:
        address: 32202 # AC Power (Watt)
        type: holding
        decode: int32
    - source: modbus
      {{- include "modbus" . | indent 4 }}
      register:
        address: 30037 # MPPT1 power — subtract PV to get true battery power
        type: holding
        decode: uint16
      scale: -0.1
    - source: modbus
      {{- include "modbus" . | indent 4 }}
      register:
        address: 30038 # MPPT2 power
        type: holding
        decode: uint16
      scale: -0.1
    - source: modbus
      {{- include "modbus" . | indent 4 }}
      register:
        address: 30039 # MPPT3 power
        type: holding
        decode: uint16
      scale: -0.1
    - source: modbus
      {{- include "modbus" . | indent 4 }}
      register:
        address: 30040 # MPPT4 power
        type: holding
        decode: uint16
      scale: -0.1
  soc:
    source: modbus
    {{- include "modbus" . | indent 2 }}
    register:
      address: 32104 # Battery SOC (%)
      type: holding
      decode: uint16
    scale: 1
  batterymode:
    source: switch
    switch:
    - case: 1 # normal
      set:
        source: sequence
        set:
        - source: const
          value: 21930
          set:
            source: modbus
            {{- include "modbus" . | indent 10 }}
            register:
              address: 42000 # RS485 Control Mode = Enabled
              type: writesingle
              decode: uint16
        - source: const
          value: {{ .work_mode_normal }}
          set:
            source: modbus
            {{- include "modbus" . | indent 10 }}
            register:
              address: 43000 # User Work Mode
              type: writesingle
              decode: uint16
        - source: const
          value: 21947
          set:
            source: modbus
            {{- include "modbus" . | indent 10 }}
            register:
              address: 42000 # RS485 Control Mode = Disabled
              type: writesingle
              decode: uint16
    - case: 2 # hold
      set:
        source: sequence
        set:
        - source: const
          value: 21930
          set:
            source: modbus
            {{- include "modbus" . | indent 10 }}
            register:
              address: 42000 # RS485 Control Mode = Enabled
              type: writesingle
              decode: uint16
        - source: const
          value: 0
          set:
            source: modbus
            {{- include "modbus" . | indent 10 }}
            register:
              address: 42010 # Force Charge/Discharge = Stop
              type: writesingle
              decode: uint16
    - case: 3 # charge
      set:
        source: sequence
        set:
        - source: const
          value: 21930
          set:
            source: modbus
            {{- include "modbus" . | indent 10 }}
            register:
              address: 42000 # RS485 Control Mode = Enabled
              type: writesingle
              decode: uint16
        - source: const
          value: 1
          set:
            source: modbus
            {{- include "modbus" . | indent 10 }}
            register:
              address: 42010 # Force Charge/Discharge = Charge
              type: writesingle
              decode: uint16
        - source: const
          value: {{ .maxchargepower }}
          set:
            source: modbus
            {{- include "modbus" . | indent 10 }}
            register:
              address: 42020 # Forcible Charge Power
              type: writesingle
              decode: uint16
  {{- include "battery-params" . }}
  {{- end }}
