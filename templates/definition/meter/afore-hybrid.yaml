template: afore-hybrid
products:
  - brand: Afore
    description:
      generic: Hybrid Inverter
capabilities: ["battery-control"]
requirements:
  description:
    en: |
      The inverter's RS485 port must be switched to "Modbus" protocol
      in the inverter menu.
    de: |
      Der RS485-Port des Wechselrichters muss im Wechselrichtermenü auf
      das "Modbus"-Protokoll umgestellt werden.
params:
  - name: usage
    choice: ["grid", "pv", "battery"]
  - name: modbus
    choice: ["tcpip"]
    port: 502
    id: 1
  - name: maxacpower
  - preset: battery-params
  - name: maxchargepower
    required: true
render: |
  type: custom
  {{- if eq .usage "grid" }}
  power:
    source: modbus
    {{- include "modbus" . | indent 2 }}
    register:
      address: 535 # Pgrid (S32, W, positive = import)
      type: input
      decode: int32
  currents:
  - source: modbus
    {{- include "modbus" . | indent 2 }}
    register:
      address: 510 # Igrid R (S16, 0.01 A)
      type: input
      decode: int16
    scale: 0.01
  - source: modbus
    {{- include "modbus" . | indent 2 }}
    register:
      address: 511 # Igrid S (S16, 0.01 A)
      type: input
      decode: int16
    scale: 0.01
  - source: modbus
    {{- include "modbus" . | indent 2 }}
    register:
      address: 512 # Igrid T (S16, 0.01 A)
      type: input
      decode: int16
    scale: 0.01
  powers:
  - source: modbus
    {{- include "modbus" . | indent 2 }}
    register:
      address: 529 # Pgrid R (S32, W)
      type: input
      decode: int32
  - source: modbus
    {{- include "modbus" . | indent 2 }}
    register:
      address: 531 # Pgrid S (S32, W)
      type: input
      decode: int32
  - source: modbus
    {{- include "modbus" . | indent 2 }}
    register:
      address: 533 # Pgrid T (S32, W)
      type: input
      decode: int32
  energy:
    source: modbus
    {{- include "modbus" . | indent 2 }}
    register:
      address: 1020 # Efromgrid total (U32, 0.1 kWh)
      type: input
      decode: uint32
    scale: 0.1
  returnenergy:
    source: modbus
    {{- include "modbus" . | indent 2 }}
    register:
      address: 1018 # Etogrid total (U32, 0.1 kWh)
      type: input
      decode: uint32
    scale: 0.1
  {{- end }}
  {{- if eq .usage "pv" }}
  power:
    source: modbus
    {{- include "modbus" . | indent 2 }}
    register:
      address: 553 # Ppv (U32, W)
      type: input
      decode: uint32
  energy:
    source: modbus
    {{- include "modbus" . | indent 2 }}
    register:
      address: 1026 # EPV total (U32, 0.1 kWh)
      type: input
      decode: uint32
    scale: 0.1
  maxacpower: {{ .maxacpower }}
  {{- end }}
  {{- if eq .usage "battery" }}
  power:
    source: modbus
    {{- include "modbus" . | indent 2 }}
    register:
      address: 2007 # Battery total power (S32, W, positive = discharging)
      type: input
      decode: int32
  soc:
    source: modbus
    {{- include "modbus" . | indent 2 }}
    register:
      address: 2002 # Battery SoC (U16, %)
      type: input
      decode: uint16
  energy:
    source: modbus
    {{- include "modbus" . | indent 2 }}
    register:
      address: 2013 # Battery total discharge (U32, 0.1 kWh)
      type: input
      decode: uint32
    scale: 0.1
  returnenergy:
    source: modbus
    {{- include "modbus" . | indent 2 }}
    register:
      address: 2011 # Battery total charge (U32, 0.1 kWh)
      type: input
      decode: uint32
    scale: 0.1
  batterymode:
    source: switch
    switch:
    - case: 1 # normal
      set:
        source: sequence
        set:
        - source: const
          value: 0xBB # ChgCmd stop (default)
          set:
            source: modbus
            {{- include "modbus" . | indent 10 }}
            register:
              address: 2501 # ChgCmd (U16)
              type: writesingle
              decode: uint16
        - source: const
          value: 0 # EMSMode self-consumption (default)
          set:
            source: modbus
            {{- include "modbus" . | indent 10 }}
            register:
              address: 2500 # EMSMode (U16)
              type: writesingle
              decode: uint16
        - source: const
          value: 1000 # PChgMax 100%
          set:
            source: modbus
            {{- include "modbus" . | indent 10 }}
            register:
              address: 2507 # PChgMax (U16, 0.1 %)
              type: writesingle
              decode: uint16
        - source: const
          value: 1000 # PDisChgMax 100%
          set:
            source: modbus
            {{- include "modbus" . | indent 10 }}
            register:
              address: 2508 # PDisChgMax (U16, 0.1 %)
              type: writesingle
              decode: uint16
    - case: 2 # hold, discharge blocked, pv charging still allowed
      set:
        source: sequence
        set:
        - source: const
          value: 0xBB # ChgCmd stop (default)
          set:
            source: modbus
            {{- include "modbus" . | indent 10 }}
            register:
              address: 2501 # ChgCmd (U16)
              type: writesingle
              decode: uint16
        - source: const
          value: 0 # EMSMode self-consumption (default)
          set:
            source: modbus
            {{- include "modbus" . | indent 10 }}
            register:
              address: 2500 # EMSMode (U16)
              type: writesingle
              decode: uint16
        - source: const
          value: 1000 # PChgMax 100%
          set:
            source: modbus
            {{- include "modbus" . | indent 10 }}
            register:
              address: 2507 # PChgMax (U16, 0.1 %)
              type: writesingle
              decode: uint16
        - source: const
          value: 0 # PDisChgMax 0%
          set:
            source: modbus
            {{- include "modbus" . | indent 10 }}
            register:
              address: 2508 # PDisChgMax (U16, 0.1 %)
              type: writesingle
              decode: uint16
    - case: 3 # charge
      set:
        source: sequence
        set:
        - source: const
          value: 1000 # PChgMax 100%
          set:
            source: modbus
            {{- include "modbus" . | indent 10 }}
            register:
              address: 2507 # PChgMax (U16, 0.1 %)
              type: writesingle
              decode: uint16
        - source: const
          value: 4 # EMSMode command mode
          set:
            source: modbus
            {{- include "modbus" . | indent 10 }}
            register:
              address: 2500 # EMSMode (U16)
              type: writesingle
              decode: uint16
        - source: const
          value: {{ .maxchargepower }} # W
          set:
            source: modbus
            {{- include "modbus" . | indent 10 }}
            register:
              address: 2502 # ChgPowerSet (S32, W), no single register write
              type: writemultiple
              decode: int32
            scale: -1 # negative = charging (like Pbat)
        - source: const
          value: 0xAA # ChgCmd charge/discharge
          set:
            source: modbus
            {{- include "modbus" . | indent 10 }}
            register:
              address: 2501 # ChgCmd (U16)
              type: writesingle
              decode: uint16
    - case: 4 # holdcharge, charge blocked, discharge allowed
      set:
        source: sequence
        set:
        - source: const
          value: 0xBB # ChgCmd stop (default)
          set:
            source: modbus
            {{- include "modbus" . | indent 10 }}
            register:
              address: 2501 # ChgCmd (U16)
              type: writesingle
              decode: uint16
        - source: const
          value: 0 # EMSMode self-consumption (default)
          set:
            source: modbus
            {{- include "modbus" . | indent 10 }}
            register:
              address: 2500 # EMSMode (U16)
              type: writesingle
              decode: uint16
        - source: const
          value: 0 # PChgMax 0%
          set:
            source: modbus
            {{- include "modbus" . | indent 10 }}
            register:
              address: 2507 # PChgMax (U16, 0.1 %)
              type: writesingle
              decode: uint16
        - source: const
          value: 1000 # PDisChgMax 100%
          set:
            source: modbus
            {{- include "modbus" . | indent 10 }}
            register:
              address: 2508 # PDisChgMax (U16, 0.1 %)
              type: writesingle
              decode: uint16
  {{- include "battery-params" . }}
  {{- end }}
