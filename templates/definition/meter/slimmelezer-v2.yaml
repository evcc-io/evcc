template: slimmelezer-V2
products:
  - brand: Zuidwijk
    description:
      generic: SlimmeLezer(+) V2
requirements:
  description:
    de: Neuere Slimmelezer-Geräte verwenden eine andere Konfiguration. Probieren Sie diese Vorlage aus, wenn die andere fehlschlägt.
    en: More recent slimmelezer devices use a different configuration. Try this template if the other one fails.
params:
  - name: usage
    choice: ["grid"]
  - name: host
  - name: scale
    example: 1 | 10 | 100 | 1000
    default: 1000
    required: true
    advanced: true
    description:
      de: Skalierungsfaktor
      en: Scale factor
    help:
      de: Verwenden Skala von 1000 für Zuidwijk Slimmelezer. Verwenden Skala 1 für ESPHome DSMR und mhendriks P1 Dongle
      en: Use scale of 1000 for Zuidwijk Slimmelezer. Use scale 1 for ESPHome DSMR and mhendriks P1 Dongle
render: |
  type: custom
  power:
    source: calc
    add:
    - source: http
      uri: http://{{ .host }}/sensor/Power Consumed
      headers:
      - content-type: application/json
      jq: .value
      scale: {{ .scale }}
    - source: http
      uri: http://{{ .host }}/sensor/Power Produced
      headers:
      - content-type: application/json
      jq: .value
      scale: -{{ .scale }}
  energy:
    source: calc
    add:
    - source: http
      uri: http://{{ .host }}/sensor/Energy Produced Tariff 1
      headers:
      - content-type: application/json
      jq: .value
    - source: http
      uri: http://{{ .host }}/sensor/Energy Produced Tariff 2
      headers:
      - content-type: application/json
      jq: .value
  currents:
  - source: http
    uri: http://{{ .host }}/sensor/Current Phase 1
    headers:
    - content-type: application/json
    jq: .value
  - source: http
    uri: http://{{ .host }}/sensor/Current Phase 2
    headers:
    - content-type: application/json
    jq: (.value // 0)
  - source: http
    uri: http://{{ .host }}/sensor/Current Phase 3
    headers:
    - content-type: application/json
    jq: (.value // 0)
  powers:
  - source: calc
    add:
    - source: http
      uri: http://{{ .host }}/sensor/Power Produced Phase 1
      headers:
      - content-type: application/json
      jq: .value
      scale: -{{ .scale }}
    - source: http
      uri: http://{{ .host }}/sensor/Power Consumed Phase 1
      headers:
      - content-type: application/json
      jq: .value
      scale: {{ .scale }}
  - source: calc
    add:
    - source: http
      uri: http://{{ .host }}/sensor/Power Produced Phase 2
      headers:
      - content-type: application/json
      jq: (.value // 0)
      scale: -{{ .scale }}
    - source: http
      uri: http://{{ .host }}/sensor/Power Consumed Phase 2
      headers:
      - content-type: application/json
      jq: (.value // 0)
      scale: {{ .scale }}
  - source: calc
    add:
    - source: http
      uri: http://{{ .host }}/sensor/Power Produced Phase 3
      headers:
      - content-type: application/json
      jq: (.value // 0)
      scale: -{{ .scale }}
    - source: http
      uri: http://{{ .host }}/sensor/Power Consumed Phase 3
      headers:
      - content-type: application/json
      jq: (.value // 0)
      scale: {{ .scale }}
