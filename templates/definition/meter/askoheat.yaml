template: askoheat
products:
  - brand: Askoma
    description:
      generic: ASKOHEAT+
group: heating
params:
  - name: usage
    choice: ["aux"]
  - name: host
  - name: port
    default: 502
  - name: id
    default: 1
  - name: tempsensor
    type: choice
    choice: ["0", "1", "2", "3", "4"]
    default: "0"
    description:
      de: Temperatursensor
      en: Temperature sensor
render: |
  type: custom
  power:
    source: modbus
    uri: {{ .host }}:{{ .port }}
    id: {{ .id }}
    register:
      address: 317
      type: input
      encoding: uint16
  soc:
    source: modbus
    uri: {{ .host }}:{{ .port }}
    id: {{ .id }}
    register:
      address: {{ add 325 (mul (int .tempsensor) 2) }}
      type: input
      encoding: float32
