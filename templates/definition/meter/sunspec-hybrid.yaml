template: sunspec-hybrid
covers: ["sunspec-hybrid-inverter"]
products:
  - description:
      de: SunSpec Hybridwechselrichter
      en: SunSpec Hybrid Inverter
group: generic
capabilities: ["curtail"]
params:
  - name: usage
    choice: ["grid", "pv", "battery"]
  - name: modbus
    choice: ["tcpip", "rs485"]
  - name: maxacpower
  - preset: battery-params
render: |
  type: custom
  # sunspec model 203 (int+sf)/ 213 (float) meter
  {{- if eq .usage "grid" }}
  power:
    source: sunspec
    {{- include "modbus" . | indent 2 }}
    value:
      - 203:W
      - 213:W
  energy:
    source: sunspec
    {{- include "modbus" . | indent 2 }}
    value:
      - 203:TotWhImp
      - 213:TotWhImp
    scale: 0.001
  returnenergy:
    source: sunspec
    {{- include "modbus" . | indent 2 }}
    value:
      - 203:TotWhExp
      - 213:TotWhExp
    scale: 0.001
  currents:
    - source: sunspec
      {{- include "modbus" . | indent 4 }}
      value:
        - 203:AphA
        - 213:AphA
    - source: sunspec
      {{- include "modbus" . | indent 4 }}
      value:
        - 203:AphB
        - 213:AphB
    - source: sunspec
      {{- include "modbus" . | indent 4 }}
      value:
        - 203:AphC
        - 213:AphC
  voltages:
    - source: sunspec
      {{- include "modbus" . | indent 4 }}
      value:
        - 203:PhVphA
        - 213:PhVphA
    - source: sunspec
      {{- include "modbus" . | indent 4 }}
      value:
        - 203:PhVphB
        - 213:PhVphB
    - source: sunspec
      {{- include "modbus" . | indent 4 }}
      value:
        - 203:PhVphC
        - 213:PhVphC
  powers:
    - source: sunspec
      {{- include "modbus" . | indent 4 }}
      value:
        - 203:WphA
        - 213:WphA
    - source: sunspec
      {{- include "modbus" . | indent 4 }}
      value:
        - 203:WphB
        - 213:WphB
    - source: sunspec
      {{- include "modbus" . | indent 4 }}
      value:
        - 203:WphC
        - 213:WphC
  {{- end }}
  {{- if eq .usage "pv" }}
  power:
    source: calc
    add:
      - source: sunspec
        {{- include "modbus" . | indent 6 }}
        value: 160:1:DCW # mppt 1
      - source: sunspec
        {{- include "modbus" . | indent 6 }}
        value: 160:2:DCW # mppt 2
  energy:
    source: calc
    add:
      - source: sunspec
        {{- include "modbus" . | indent 6 }}
        value: 160:1:DCWH # mppt 1
        scale: 0.001
      - source: sunspec
        {{- include "modbus" . | indent 6 }}
        value: 160:2:DCWH # mppt 2
        scale: 0.001
  curtail:
    source: sequence
    set:
      - source: sunspec
        {{- include "modbus" . | indent 6 }}
        value:
          - 704:WMaxLimPct
          - 123:WMaxLimPct
      - source: switch
        switch:
          - case: 100 # Uncurtailed
            set:
              source: const
              value: 0 # Limit disabled
              set:
                source: sunspec
                {{- include "modbus" . | indent 14 }}
                value:
                  - 704:WMaxLimPctEna
                  - 123:WMaxLim_Ena
        default:
          source: const
          value: 1 # Limit enabled
          set:
            source: sunspec
            {{- include "modbus" . | indent 10 }}
            value:
              - 704:WMaxLimPctEna
              - 123:WMaxLim_Ena
  curtailed:
    source: sunspec
    {{- include "modbus" . | indent 2 }}
    value:
      - 704:WMaxLimPctEna
      - 123:WMaxLim_Ena
  maxacpower: {{ .maxacpower }} # W
  {{- end }}
  {{- if eq .usage "battery" }}
  power:
    source: calc
    add:
      - source: sunspec
        {{- include "modbus" . | indent 6 }}
        value: 160:3:DCW # mppt 3 (charge)
        scale: -1
      - source: sunspec
        {{- include "modbus" . | indent 6 }}
        value: 160:4:DCW # mppt 4 (discharge)
  energy:
    source: sunspec
    {{- include "modbus" . | indent 2 }}
    value: 160:4:DCWH # mppt 4 (discharge)
    scale: 0.001
  returnenergy:
    source: sunspec
    {{- include "modbus" . | indent 2 }}
    value: 160:3:DCWH # mppt 3 (charge)
    scale: 0.001
  soc:
    source: sunspec
    {{- include "modbus" . | indent 2 }}
    value:
      - 124:ChaState
      - 802:SoC
  {{- include "battery-params" . }}
  {{- end }}
