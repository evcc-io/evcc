template: sigenergy
products:
  - brand: Sigenergy
    description:
      generic: Sigen Hybrid
  - brand: Sigenergy
    description:
      generic: Sigen PV Max
  - brand: Sigenergy
    description:
      generic: SigenStore EC
capabilities: ["battery-control"]
requirements:
  description:
    de: Modbus TCP muss in der Konfigurations-App mit Installateursrechten aktiviert werden. Diese Option ist in der mySigen App für Kunden nicht verfügbar.
    en: Modbus TCP must be enabled in the configuration app with installer rights. This option is not available in the mySigen app for customers.
params:
  - name: usage
    choice: ["grid", "pv", "battery"]
  - name: host
  - name: port
    default: 502
  - name: id
    default: 1
  - name: maxacpower
  - preset: battery-params
render: |
  type: custom
  {{- if eq .usage "grid" }}
  power:
    source: modbus
    uri: {{ .host }}:{{ .port }}
    id: 247
    register:
      address: 30005 # [Grid sensor] Active power
      type: holding
      decode: int32
  energy:
    source: modbus
    uri: {{ .host }}:{{ .port }}
    id: {{ .id }}
    register:
      address: 30562 # Accumulated import energy
      type: holding
      decode: uint64
    scale: 0.01
  currents:
    - source: modbus
      uri: {{ .host }}:{{ .port }}
      id: {{ .id }}
      register:
        address: 31017 # Phase A current
        type: holding
        decode: int32
      scale: 0.01
    - source: modbus
      uri: {{ .host }}:{{ .port }}
      id: {{ .id }}
      register:
        address: 31019 # Phase B current
        type: holding
        decode: int32
      scale: 0.01
    - source: modbus
      uri: {{ .host }}:{{ .port }}
      id: {{ .id }}
      register:
        address: 31021 # Phase C current
        type: holding
        decode: int32
      scale: 0.01
  {{- end }}
  {{- if eq .usage "pv" }}
  power:
    source: modbus
    uri: {{ .host }}:{{ .port }}
    id: 247
    register:
      type: holding
      address: 30035 # Photovoltaic power
      decode: int32
  maxacpower: {{ .maxacpower }} # W
  {{- end }}
  {{- if eq .usage "battery" }}
  power:
    source: modbus
    uri: {{ .host }}:{{ .port }}
    id: 247
    register:
      type: holding
      address: 30037 # Battery power
      decode: int32
    scale: -1
  energy:
    source: modbus
    uri: {{ .host }}:{{ .port }}
    id: {{ .id }}
    register:
      address: 30574 # Battery accumulated discharge energy
      type: holding
      decode: uint64
    scale: 0.01
  soc:
    source: modbus
    uri: {{ .host }}:{{ .port }}
    id: 247
    register:
      address: 30014 # Energy storage system SOC
      type: holding
      decode: uint16
    scale: 0.1
  limitsoc:
    source: convert
    convert: float2int
    set:
      source: modbus
      uri: {{ .host }}:{{ .port }}
      id: 247
      register:
        address: 40048 # Discharge Cut-Off SoC
        type: writeholding
        decode: uint16
      scale: 10
  {{- include "battery-params" . }}
  {{- end }}
