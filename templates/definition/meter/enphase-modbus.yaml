template: enphase-modbus
products:
  - brand: Enphase
    description:
      generic: IQ Gateway (Modbus)
requirements:
  description:
    en: |
      Requires Enphase support to enable modbus functionality on IQ Gateway.
    de: |
      Erfordert Enphase-Unterstützung, um die Modbus-Funktionalität auf dem IQ Gateway zu aktivieren.
params:
  - name: usage
    choice: ["pv"]
  - name: modbus
    choice: ["tcpip"]
    id: 1
render: |
  type: custom
  {{- if eq .usage "pv" }}
  power:
    source: modbus
    {{- include "modbus" . | indent 2 }}
    register:
      address: 40080 # Total active power. Active power is positive for DER generation and negative for absorption.
      type: holding
      decode: int16
    scale: 1
  energy:
    source: modbus
    {{- include "modbus" . | indent 2 }}
    register:
      address: 40089 # Total active energy injected.
      type: holding
      decode: uint64
    scale: 0.001
  currents:
  - source: modbus
    {{- include "modbus" . | indent 2 }}
    register:
      address: 40115 # Current phase L1.
      type: holding
      decode: int16
    scale: 0.01
  - source: modbus
    {{- include "modbus" . | indent 2 }}
    register:
      address: 40138 # Current phase L2.
      type: holding
      decode: int16
    scale: 0.01
  - source: modbus
    {{- include "modbus" . | indent 2 }}
    register:
      address: 40161 # Current phase L3.
      type: holding
      decode: int16
    scale: 0.01
  voltages:
  - source: modbus
    {{- include "modbus" . | indent 2 }}
    register:
      address: 40117 # Phase voltage L1-N.
      type: holding
      decode: uint16
    scale: 0.01
  - source: modbus
    {{- include "modbus" . | indent 2 }}
    register:
      address: 40140 # Phase voltage L2-N.
      type: holding
      decode: uint16
    scale: 0.01
  - source: modbus
    {{- include "modbus" . | indent 2 }}
    register:
      address: 40163 # Phase voltage L3-N.
      type: holding
      decode: uint16
    scale: 0.01
  {{- end }}
