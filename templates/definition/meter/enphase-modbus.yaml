template: enphase-modbus
products:
  - brand: Enphase
    description:
      generic: IQ Gateway (Modbus)
requirements:
  description:
    en: |
      Requires Enphase support to enable modbus functionality on IQ Gateway.
    de: |
      Erfordert Enphase-Unterstützung, um die Modbus-Funktionalität auf dem IQ Gateway zu aktivieren.
capabilities: ["curtail"]
params:
  - name: usage
    choice: ["pv"]
  - name: modbus
    choice: ["tcpip"]
    id: 1
render: |
  type: custom
  # sunspec model 701 (DER AC Measurement)
  {{- if eq .usage "pv" }}
  power:
    source: sunspec
    {{- include "modbus" . | indent 2 }}
    value: 701:W
  energy:
    source: sunspec
    {{- include "modbus" . | indent 2 }}
    value: 701:TotWhInj
    scale: 0.001
  currents:
    - source: sunspec
      {{- include "modbus" . | indent 4 }}
      value: 701:AL1
    - source: sunspec
      {{- include "modbus" . | indent 4 }}
      value: 701:AL2
    - source: sunspec
      {{- include "modbus" . | indent 4 }}
      value: 701:AL3
  voltages:
    - source: sunspec
      {{- include "modbus" . | indent 4 }}
      value: 701:VL1
    - source: sunspec
      {{- include "modbus" . | indent 4 }}
      value: 701:VL2
    - source: sunspec
      {{- include "modbus" . | indent 4 }}
      value: 701:VL3
  curtail:
    source: sequence
    set:
    - source: modbus
      {{- include "modbus" . | indent 4 }}
      register:
        address: 40311 # Limit maximum active power percent value.
        type: writesingle
        encoding: uint16
    - source: switch
      switch:
        - case: 100 # Uncurtailed
          set:
            source: const
            value: 0 # Limit disabled
            set:
              source: modbus
              {{- include "modbus" . | indent 12 }}
              register:
                address: 40310 # Limit maximum active power percent enable.
                type: writesingle
                encoding: uint16
      default:
        source: const
        value: 1 # Limit enabled
        set:
          source: modbus
          {{- include "modbus" . | indent 8 }}
          register:
            address: 40310 # Limit maximum active power percent enable.
            type: writesingle
            encoding: uint16
  curtailed:
    source: modbus
    {{- include "modbus" . | indent 2 }}
    register:
      address: 40310 # Limit maximum active power percent enable (0 = no curtailment).
      type: holding
      decode: uint16
  {{- end }}
