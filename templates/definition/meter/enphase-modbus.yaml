template: enphase-modbus
products:
  - brand: Enphase
    description:
      generic: IQ Gateway (Modbus)
requirements:
  description:
    en: |
      Requires Enphase support to enable modbus functionality on IQ Gateway.
    de: |
      Erfordert Enphase-Unterstützung, um die Modbus-Funktionalität auf dem IQ Gateway zu aktivieren.
capabilities: ["curtail"]
params:
  - name: usage
    choice: ["pv"]
  - name: modbus
    choice: ["tcpip"]
    id: 1
  - name: curtailpercent
    description:
      en: Active power limit in percent
      de: Wirkleistungsbegrenzung in Prozent
    advanced: true
    usages: ["pv"]
render: |
  type: custom
  # sunspec model 701 (DER AC Measurement)
  {{- if eq .usage "pv" }}
  power:
    source: sunspec
    {{- include "modbus" . | indent 2 }}
    value: 701:W
  energy:
    source: sunspec
    {{- include "modbus" . | indent 2 }}
    value: 701:TotWhInj
    scale: 0.001
  currents:
    - source: sunspec
      {{- include "modbus" . | indent 4 }}
      value: 701:AL1
    - source: sunspec
      {{- include "modbus" . | indent 4 }}
      value: 701:AL2
    - source: sunspec
      {{- include "modbus" . | indent 4 }}
      value: 701:AL3
  voltages:
    - source: sunspec
      {{- include "modbus" . | indent 4 }}
      value: 701:VL1
    - source: sunspec
      {{- include "modbus" . | indent 4 }}
      value: 701:VL2
    - source: sunspec
      {{- include "modbus" . | indent 4 }}
      value: 701:VL3
  curtail:
    source: ifelse
    if:
      source: convert
      convert: bool2int
      set:
        source: sequence
        set:
          - source: const
            value: {{ .curtailpercent }}
            set:
              source: modbus
              {{- include "modbus" . | indent 12 }}
              register:
                address: 40311
                type: writesingle
                encoding: uint16
          - source: const
            value: 1
            set:
              source: modbus
              {{- include "modbus" . | indent 12 }}
              register:
                address: 40310
                type: writesingle
                encoding: bool16
    else:
      source: convert
      convert: bool2int
      set:
        source: sequence
        set:
          - source: const
            value: 100
            set:
              source: modbus
              {{- include "modbus" . | indent 12 }}
              register:
                address: 40311
                type: writesingle
                encoding: uint16
          - source: const
            value: 0
            set:
              source: modbus
              {{- include "modbus" . | indent 12 }}
              register:
                address: 40310
                type: writesingle
                encoding: bool16
  curtailed:
    source: modbus
    {{- include "modbus" . | indent 2 }}
    register:
      address: 40310
      type: holding
      decode: uint16
  {{- end }}
