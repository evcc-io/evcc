template: easee
products:
  - brand: Easee
    description:
      generic: Equalizer
requirements:
  evcc: ["sponsorship"]
params:
  - name: usage
    choice: ["grid"]
  - name: user
    required: true
    help:
      de: Emailadresse
      en: Email address
  - name: password
    required: true
    help:
      de: wie Login für Easee App oder Web Portal (https://easee.cloud)
      en: same as Easee app or the web portal (https://easee.cloud)
  - name: equalizer
    required: true
    description:
      de: Equalizer Seriennummer
      en: Equalizer serial number
    example: QP______
  - name: timeout
    default: 20s
    help:
      de: Spezifisches Timeout für Easee API Interaktionen. Kann Warnungen und Fehler bei träger Easee API reduzieren.
      en: Timeout specifically for Easee API interactions. Can reduce warnings and errors in case of lagging Easee API.
render: |
  type: easee
  user: {{ .user }}
  password: {{ .password }}
  meter: {{ .equalizer }}
  timeout: {{ .timeout }}
