template: fritzdect
products:
  - brand: AVM
    description:
      generic: "FRITZ!DECT 200"
  - brand: AVM
    description:
      generic: "FRITZ!DECT 210"
  - brand: AVM
    description:
      generic: "FRITZ!Powerline 546E"
  - brand: "FRITZ!"
    description:
      generic: "FRITZ!Smart Energy 200"
  - brand: "FRITZ!"
    description:
      generic: "FRITZ!Smart Energy 210"
group: switchsockets
params:
  - name: usage
    choice: ["pv", "charge"]
  - name: uri
    default: https://fritz.box
  - name: user
    required: true
  - name: password
    required: true
  - name: ain
    required: true
  - name: legacy
    advanced: true
    default: false
    description:
      de: Alte API verwenden (vor FritzOS 8.2)
      en: Use legacy API (before FritzOS 8.2)
    help:
      de: Verwende die alte homeautoswitch.lua API für FritzOS vor Version 8.2
      en: Use the legacy homeautoswitch.lua API for FritzOS before version 8.2
render: |
  type: fritzdect
  uri: {{ .uri }}
  user: {{ .user }}
  password: {{ .password }}
  ain: {{ .ain }} # switch actor identification number without blanks (see AIN number on switch sticker)
  legacy: {{ .legacy }}
