template: sunspec-hybrid-curtailable
products:
  - description:
      de: SunSpec Hybridwechselrichter (abregelbar)
      en: SunSpec Hybrid Inverter (curtailable)
group: generic
capabilities: ["curtail"]
params:
  - name: usage
    choice: ["pv"]
  - name: modbus
    choice: ["tcpip", "rs485"]
  - name: maxacpower
render: |
  type: custom
  # sunspec model 203 (int+sf)/ 213 (float) meter
  power:
    source: calc
    add:
      - source: sunspec
        {{- include "modbus" . | indent 6 }}
        value: 160:1:DCW # mppt 1
      - source: sunspec
        {{- include "modbus" . | indent 6 }}
        value: 160:2:DCW # mppt 2
  energy:
    source: calc
    add:
      - source: sunspec
        {{- include "modbus" . | indent 6 }}
        value: 160:1:DCWH # mppt 1
        scale: 0.001
      - source: sunspec
        {{- include "modbus" . | indent 6 }}
        value: 160:2:DCWH # mppt 2
        scale: 0.001
  curtail:
    source: sequence
    set:
      - source: sunspec
        {{- include "modbus" . | indent 6 }}
        value:
          - 704:WMaxLimPct
          - 123:WMaxLimPct
      - source: switch
        switch:
          - case: 100 # Uncurtailed
            set:
              source: const
              value: 0 # Limit disabled
              set:
                source: sunspec
                {{- include "modbus" . | indent 14 }}
                value:
                  - 704:WMaxLimPctEna
                  - 123:WMaxLim_Ena
        default:
          source: const
          value: 1 # Limit enabled
          set:
            source: sunspec
            {{- include "modbus" . | indent 10 }}
            value:
              - 704:WMaxLimPctEna
              - 123:WMaxLim_Ena
  curtailed: # the limit percentage only applies while the limit is enabled
    source: go
    in:
    - name: ena
      type: bool
      config:
        source: sunspec
        {{- include "modbus" . | indent 6 }}
        value:
          - 704:WMaxLimPctEna
          - 123:WMaxLim_Ena
    - name: limit
      type: float
      config:
        source: sunspec
        {{- include "modbus" . | indent 6 }}
        value:
          - 704:WMaxLimPct
          - 123:WMaxLimPct
    script: |
      percent := 100
      if ena {
        percent = int(limit)
      }
      percent
  maxacpower: {{ .maxacpower }} # W
