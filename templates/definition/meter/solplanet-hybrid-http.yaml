template: solplanet-hybrid-http
products:
  - brand: Solplanet
    description:
      en: ASW-H Hybrid Inverter (AI dongle, HTTP)
      de: ASW-H Hybrid-Wechselrichter (AI-Dongle, HTTP)
requirements:
  description:
    en: |
      For the AI LAN/WiFi dongle (V1, port 8484), which does not expose Modbus TCP/RTU directly. Reads use the dongle's undocumented `getdevdata.cgi` JSON endpoint, battery control tunnels raw Modbus-RTU frames through the equally undocumented `fdbg.cgi` endpoint ([background and more testers in discussion #17680](https://github.com/evcc-io/evcc/discussions/17680)).

      If the dongle exposes real Modbus (RS485, or TCP on a newer firmware), use the [solplanet-hybrid](https://github.com/evcc-io/evcc/blob/master/templates/definition/meter/solplanet-hybrid.yaml) template instead - it supports a configurable charge power.

      **Charging here is fixed at 5000 W.** The fdbg.cgi tunnel takes precomputed Modbus RTU frames including a CRC16 checksum; evcc has no way to compute one for an arbitrary configured wattage, so only the 5000 W frame confirmed working in the discussion is included.
    de: |
      Für den AI LAN/WiFi-Dongle (V1, Port 8484), der kein Modbus TCP/RTU anbietet. Messwerte kommen über die undokumentierte `getdevdata.cgi`-JSON-Schnittstelle des Dongles, die Batteriesteuerung nutzt einen Tunnel für rohe Modbus-RTU-Frames über die ebenfalls undokumentierte `fdbg.cgi`-Schnittstelle ([Hintergrund und weitere Tester in Diskussion #17680](https://github.com/evcc-io/evcc/discussions/17680)).

      Falls der Dongle echtes Modbus anbietet (RS485 oder TCP bei neuerer Firmware), stattdessen das [solplanet-hybrid](https://github.com/evcc-io/evcc/blob/master/templates/definition/meter/solplanet-hybrid.yaml)-Template verwenden - dort ist die Ladeleistung konfigurierbar.
  evcc: ["skiptest"]
capabilities: ["battery-control"]
params:
  - name: usage
    choice: ["grid", "pv", "battery"]
  - name: host
  - name: serial
    required: true
  - preset: battery-params
render: |
  type: custom
  {{- if eq .usage "grid" }}
  power:
    source: http
    uri: http://{{ .host }}:8484/getdevdata.cgi?device=3&sn={{ .serial }}
    jq: .pac # grid power, W
  {{- end }}
  {{- if eq .usage "pv" }}
  power:
    source: http
    uri: http://{{ .host }}:8484/getdevdata.cgi?device=4&sn={{ .serial }}
    jq: .ppv # PV power, W
  {{- end }}
  {{- if eq .usage "battery" }}
  power:
    source: http
    uri: http://{{ .host }}:8484/getdevdata.cgi?device=4&sn={{ .serial }}
    jq: .pb # battery power, W
  soc:
    source: http
    uri: http://{{ .host }}:8484/getdevdata.cgi?device=4&sn={{ .serial }}
    jq: .soc # battery SOC, %
  # batterymode disabled pending further verification - see discussion #17680
  # batterymode:
  #   source: switch
  #   switch:
  #   - case: 1 # normal
  #     set:
  #       source: http
  #       uri: http://{{ .host }}:8484/fdbg.cgi
  #       method: POST
  #       headers:
  #         Content-Type: application/json
  #       body: '{"data":"0306044f0002390e"}' # write reg 1103 (mode) = 2 (normal)
  #   - case: 2 # hold: custom mode + 0 W
  #     set:
  #       source: sequence
  #       set:
  #       - source: http
  #         uri: http://{{ .host }}:8484/fdbg.cgi
  #         method: POST
  #         headers:
  #           Content-Type: application/json
  #         body: '{"data":"0306044f0004b90c"}' # write reg 1103 (mode) = 4 (custom)
  #       - source: http
  #         uri: http://{{ .host }}:8484/fdbg.cgi
  #         method: POST
  #         headers:
  #           Content-Type: application/json
  #         body: '{"data":"03060480000088f0"}' # write reg 1152 (setpoint) = 0 W
  #   - case: 3 # charge: custom mode + fixed 5000 W (see requirements)
  #     set:
  #       source: sequence
  #       set:
  #       - source: http
  #         uri: http://{{ .host }}:8484/fdbg.cgi
  #         method: POST
  #         headers:
  #           Content-Type: application/json
  #         body: '{"data":"0306044f0004b90c"}' # write reg 1103 (mode) = 4 (custom)
  #       - source: http
  #         uri: http://{{ .host }}:8484/fdbg.cgi
  #         method: POST
  #         headers:
  #           Content-Type: application/json
  #         body: '{"data":"03060480ec78c412"}' # write reg 1152 (setpoint) = -5000 W
  {{- include "battery-params" . }}
  {{- end }}
