template: eltako-modbus
products:
  - brand: Eltako
    description:
      generic: DSZ15DZMOD
requirements:
  description:
    de: |
      Getestet zusammen mit dem Modbus-Gateway von Eltako (ZGW16-IP). Im Gateway müssen folgende Register aktiviert werden: 30001, 30003, 30005, 30007, 30009, 30011, 30013, 30015, 30017, 30053, 30073, 30075 
    en: |
      Tested with the Modbus gateway Eltako ZGW16-IP. In the gateway settings you need to activate the following registers: 30001, 30003, 30005, 30007, 30009, 30011, 30013, 30015, 30017, 30053, 30073, 30075       
params:
  - name: usage
    choice: ["charge", "grid", "pv", "battery"]
  - name: host
  - name: port
    default: 502
  - name: meter_id
    default: 1
    description:
      de: Modbus Slave-ID des spezifischen Zählers
      en: Modbus slave id of the specific meter
render: |
  type: custom
  power: # current power in W
    source: modbus
    id: {{ .meter_id }}
    uri: {{ joinHostPort .host .port }}
    register:
      address: 52
      type: input
      decode: int32
    timeout: 2s

  energy: # meter in kWh
    source: modbus
    id: {{ .meter_id }}
    uri: {{ joinHostPort .host .port }}
    register:
      address: 72
      type: input
      decode: int32
    timeout: 2s
    scale: 0.01
  returnenergy: # return meter in kWh
    source: modbus
    id: {{ .meter_id }}
    uri: {{ joinHostPort .host .port }}
    register:
      address: 74
      type: input
      decode: int32
    timeout: 2s
    scale: 0.01
    
  powers: # phase powers in W
    - source: modbus
      id: {{ .meter_id }}
      uri: {{ joinHostPort .host .port }}
      register:
        address: 12
        type: input
        decode: int32
      timeout: 2s
    - source: modbus
      id: {{ .meter_id }}
      uri: {{ joinHostPort .host .port }}
      register:
        address: 14
        type: input
        decode: int32
      timeout: 2s
    - source: modbus
      id: {{ .meter_id }}
      uri: {{ joinHostPort .host .port }}
      register:
        address: 16
        type: input
        decode: int32
      timeout: 2s
      
  currents: # phase currents in A
    - source: modbus
      id: {{ .meter_id }}
      uri: {{ joinHostPort .host .port }}
      register:
        address: 6
        type: input
        decode: int32
      timeout: 2s
      scale: 0.01
    - source: modbus
      id: {{ .meter_id }}
      uri: {{ joinHostPort .host .port }}
      register:
        address: 8
        type: input
        decode: int32
      timeout: 2s
      scale: 0.01
    - source: modbus
      id: {{ .meter_id }}
      uri: {{ joinHostPort .host .port }}
      register:
        address: 10
        type: input
        decode: int32
      timeout: 2s
      scale: 0.01
      
  voltages: # phase voltages in V
    - source: modbus
      id: {{ .meter_id }}
      uri: {{ joinHostPort .host .port }}
      register:
        address: 0
        type: input
        decode: int32
      timeout: 2s
      scale: 0.01
    - source: modbus
      id: {{ .meter_id }}
      uri: {{ joinHostPort .host .port }}
      register:
        address: 2
        type: input
        decode: int32
      timeout: 2s
      scale: 0.01
    - source: modbus
      id: {{ .meter_id }}
      uri: {{ joinHostPort .host .port }}
      register:
        address: 4
        type: input
        decode: int32
      timeout: 2s
      scale: 0.01
