template: eltako-modbus
products:
  - brand: Eltako
    description:
      generic: DSZ15DZMOD
requirements:
  description:
    de: |
      Wird das Gateway von Eltako verwendet (ZGW16-IP) müssen folgende Register aktiviert werden: 30001, 30003, 30005, 30007, 30009, 30011, 30013, 30015, 30017, 30053, 30073, 30075
    en: |
      If you use the modbus gateway from Eltako (ZGW16-IP), you need to activate the following registers in the gateway setting: 30001, 30003, 30005, 30007, 30009, 30011, 30013, 30015, 30017, 30053, 30073, 30075
params:
  - name: usage
    choice: ["charge", "grid", "pv"]
  - name: modbus
    choice: ["tcpip"]
    port: 502
    id: 1
  - name: get_powers_per_phase
    default: "no"
    advanced: true
    description:
      de: Leistung der einzelnen Phasen abrufen
      en: Get power of single phases
    help:
      de: Die Leistungswerte der einzelnen Phasen werden für die Steuerung nicht benötigt, können jedoch durch evcc abgerufen und angezeigt werden.
      en: The power values of the single phases aren't needed for control purposes, but evcc can retrieve and display them.
    type: bool
render: |
  type: custom
  power: # current power in W
    source: modbus
    {{- include "modbus" . | indent 2 }}
    register:
      address: 52
      type: input
      decode: int32
  energy: # meter in kWh
    source: modbus
    {{- include "modbus" . | indent 2 }}
    register:
      address: 72
      type: input
      decode: int32
    scale: 0.01
  returnenergy: # return meter in kWh
    source: modbus
    {{- include "modbus" . | indent 2 }}
    register:
      address: 74
      type: input
      decode: int32
    scale: 0.01
  {{ if eq .get_powers_per_phase "true" }}
  powers: # phase powers in W
    - source: modbus
      {{- include "modbus" . | indent 4 }}
      register:
        address: 12
        type: input
        decode: int32
    - source: modbus
      {{- include "modbus" . | indent 4 }}
      register:
        address: 14
        type: input
        decode: int32
    - source: modbus
      {{- include "modbus" . | indent 4 }}
      register:
        address: 16
        type: input
        decode: int32
  {{ end }}
  currents: # phase currents in A
    - source: modbus
      {{- include "modbus" . | indent 4 }}
      register:
        address: 6
        type: input
        decode: int32
      scale: 0.01
    - source: modbus
      {{- include "modbus" . | indent 4 }}
      register:
        address: 8
        type: input
        decode: int32
      scale: 0.01
    - source: modbus
      {{- include "modbus" . | indent 4 }}
      register:
        address: 10
        type: input
        decode: int32
      scale: 0.01
  voltages: # phase voltages in V
    - source: modbus
      {{- include "modbus" . | indent 4 }}
      register:
        address: 0
        type: input
        decode: int32
      scale: 0.01
    - source: modbus
      {{- include "modbus" . | indent 4 }}
      register:
        address: 2
        type: input
        decode: int32
      scale: 0.01
    - source: modbus
      {{- include "modbus" . | indent 4 }}
      register:
        address: 4
        type: input
        decode: int32
      scale: 0.01
