template: eltako-modbus
products:
  - brand: Eltako
    description:
      generic: DSZ15DZMOD
requirements:
  description:
    de: |
      Getestet zusammen mit dem Modbus-Gateway von Eltako (ZGW16-IP).

      Im Gateway müssen folgende Register aktiviert werden: 30001, 30003, 30005, 30007, 30009, 30011, 30013, 30015, 30017, 30053, 30073, 30075
    en: |
      Tested with Modbus gateway Eltako ZGW16-IP.

      You need to activate the following registers in the gateway setting: 30001, 30003, 30005, 30007, 30009, 30011, 30013, 30015, 30017, 30053, 30073, 30075
params:
  - name: usage
    choice: ["charge", "grid", "pv"]
  - name: modbus
    choice: ["tcpip"]
    port: 502
    id: 1
  - name: timeout
    default: 15s
render: |
  type: custom
  power: # current power in W
    source: modbus
    {{- include "modbus" . | indent 2 }}
    timeout: {{ .timeout }}
    register:
      address: 52
      type: input
      decode: int32


  energy: # meter in kWh
    source: modbus
    {{- include "modbus" . | indent 2 }}
    timeout: {{ .timeout }}
    register:
      address: 72
      type: input
      decode: int32
    scale: 0.01
  returnenergy: # return meter in kWh
    source: modbus
    {{- include "modbus" . | indent 2 }}
    timeout: {{ .timeout }}
    register:
      address: 74
      type: input
      decode: int32
    scale: 0.01
    
  powers: # phase powers in W
    - source: modbus
      {{- include "modbus" . | indent 4 }}
      timeout: {{ .timeout }}
      register:
        address: 12
        type: input
        decode: int32
    - source: modbus
      {{- include "modbus" . | indent 4 }}
      timeout: {{ .timeout }}
      register:
        address: 14
        type: input
        decode: int32
    - source: modbus
      {{- include "modbus" . | indent 4 }}
      timeout: {{ .timeout }}
      register:
        address: 16
        type: input
        decode: int32
      
  currents: # phase currents in A
    - source: modbus
      {{- include "modbus" . | indent 4 }}
      timeout: {{ .timeout }}
      register:
        address: 6
        type: input
        decode: int32
      scale: 0.01
    - source: modbus
      {{- include "modbus" . | indent 4 }}
      timeout: {{ .timeout }}
      register:
        address: 8
        type: input
        decode: int32
      scale: 0.01
    - source: modbus
      {{- include "modbus" . | indent 4 }}
      timeout: {{ .timeout }}
      register:
        address: 10
        type: input
        decode: int32
      scale: 0.01
      
  voltages: # phase voltages in V
    - source: modbus
      {{- include "modbus" . | indent 4 }}
      timeout: {{ .timeout }}
      register:
        address: 0
        type: input
        decode: int32
      scale: 0.01
    - source: modbus
      {{- include "modbus" . | indent 4 }}
      timeout: {{ .timeout }}
      register:
        address: 2
        type: input
        decode: int32
      scale: 0.01
    - source: modbus
      {{- include "modbus" . | indent 4 }}
      timeout: {{ .timeout }}
      register:
        address: 4
        type: input
        decode: int32
      scale: 0.01
