template: hypontech
products:
  - brand: HYPONTECH
  - brand: Enerlution
params:
  - name: usage
    choice: ['grid', 'pv', 'battery']
  - name: modbus
    choice: ['rs485', 'tcpip']
    baudrate: 9600
render: |
  type: custom
  {{- if eq .usage "grid" }}
  power:
    source: modbus
    {{- include "modbus" . | indent 4 }}
    register:
      address: 108 # MeterPower (30108)
      type: input
      decode: int32s
  energy:
    source: modbus
    {{- include "modbus" . | indent 4 }}
    register:
      address: 156 # Import energy from meter (30156)
      type: input
      decode: float32
  {{- end }}
  {{- if eq .usage "pv" }}
  power:
    source: modbus
    {{- include "modbus" . | indent 4 }}
    register:
      address: 127 # PV Power (30127)
      type: input
      decode: int32s
  energy:
    source: modbus
    {{- include "modbus" . | indent 4 }}
    register:
      address: 129 # PV kWH (30129)
      type: input
      decode: float32
  {{- end }}
  {{- if eq .usage "battery" }}
  power:
    source: modbus
    {{- include "modbus" . | indent 4 }}
    register:
      address: 162 # Battery charge/discharge power (30162)
      type: input
      decode: int32s
  energy:
    source: modbus
    {{- include "modbus" . | indent 4 }}
    register:
      address: 176 # BatteryDischargeEnergy (30176)
      type: input
      decode: float32
  soc:
    source: modbus
    {{- include "modbus" . | indent 4 }}
    register:
      address: 182 # SOC (30182)
      type: input
      decode: uint16
  {{- end }}
