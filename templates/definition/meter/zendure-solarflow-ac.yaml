template: zendure-solarflow-ac
covers: [zendure-solarflow-2400-ac]
products:
  - brand: Zendure
    description:
      generic: Solarflow AC
params:
  - name: usage
    choice: ["battery"]
  - name: host
  - preset: battery-capacity
  - preset: battery-power
  - name: minsoc
    deprecated: true
  - name: maxsoc
    deprecated: true
  - name: cache
    default: 1s
render: |
  type: custom
  power:
    source: http
    uri: http://{{ .host }}/properties/report
    jq: .properties.packInputPower - .properties.outputPackPower
    cache: {{ .cache }}
  soc:
    source: http
    uri: http://{{ .host }}/properties/report
    jq: .properties.electricLevel
    cache: {{ .cache }}
  minsoc:
    source: http
    uri: http://{{ .host }}/properties/report
    jq: .properties.minSoc
    scale: 0.1
    cache: {{ .cache }}
  maxsoc:
    source: http
    uri: http://{{ .host }}/properties/report
    jq: .properties.socSet
    scale: 0.1
    cache: {{ .cache }}
  {{- include "battery-capacity" . }}
  {{- include "battery-power" . }}
