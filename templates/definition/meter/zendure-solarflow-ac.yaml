template: zendure-solarflow-ac
covers: [zendure-solarflow-2400-ac]
products:
  - brand: Zendure
    description:
      generic: Solarflow AC
params:
  - name: usage
    choice: ["battery"]
  - name: host
  - preset: battery-params
  - name: cache
    default: 1s
render: |
  type: custom
  getminsoc:
    source: http
    uri: http://{{ .host }}/properties/report
    jq: .properties.minSoc
    scale: 0.01
    cache: {{ .cache }}
  getmaxsoc:
    source: http
    uri: http://{{ .host }}/properties/report
    jq: .properties.socSet
    scale: 0.01
    cache: {{ .cache }}
  power:
    source: http
    uri: http://{{ .host }}/properties/report
    jq: .properties.packInputPower - .properties.outputPackPower
    cache: {{ .cache }}
  soc:
    source: http
    uri: http://{{ .host }}/properties/report
    jq: .properties.electricLevel
    cache: {{ .cache }}
  {{- include "battery-params" . }}
