template: dsmrlogger-aandewiel
products:
  - brand: Aandewiel
    description:
      generic: DSMR-logger API
  - brand: Smartstuff DSMR-logger API
    description:
      generic: P1 Dongle with DSMR-logger API
requirements:
  description:
    generic: "[DSMR-logger](https://github.com/mrWheel/DSMRloggerAPI) by Willem Aandewiel, REST-API version"
params:
  - name: usage
    choice: ["grid"]
  - name: host
  - name: apiversion
    choice: ["v1", "v2"]
    default: "v1"
    required: true
    advanced: true
    description:
      de: API Version
      en: API version
    help:
      de: "API v1 für DSMR-logger API v1, API v2 für DSMR-logger API v2 (Smartstuff P1 Dongle mit DSMR-logger API v2)"
      en: "Use API v1 for DSMR-logger API v1, use API v2 for DSMR-logger API v2 (Smartstuff P1 Dongle with DSMR-logger API v2)"
render: |
  {{- define "uri" -}}
  http://{{ .host }}/api/{{ .apiversion }}/sm/actual
  {{- end }}
  type: custom
  power:
    source: http
    uri: {{ include "uri" . }}
    headers:
      - content-type: application/json
    jq: >
      ((.actual[] | select(.name == "power_delivered") | .value // 0) * 1000)
      - ((.actual[] | select(.name == "power_returned") | .value // 0) * 1000)

  voltages: # phase voltages in V
    - source: http
      uri: {{ include "uri" . }}
      headers:
        - content-type: application/json
      jq: .actual[] | select(.name == "voltage_l1") | .value
    - source: http
      uri: {{ include "uri" . }}
      headers:
        - content-type: application/json
      jq: .actual[] | select(.name == "voltage_l2") | .value
    - source: http
      uri: {{ include "uri" . }}
      headers:
        - content-type: application/json
      jq: .actual[] | select(.name == "voltage_l3") | .value

  currents: # phase currents in A
    - source: http
      uri: {{ include "uri" . }}
      headers:
        - content-type: application/json
      jq: .actual[] | select(.name == "current_l1") | .value
    - source: http
      uri: {{ include "uri" . }}
      headers:
        - content-type: application/json
      jq: .actual[] | select(.name == "current_l2") | .value
    - source: http
      uri: {{ include "uri" . }}
      headers:
        - content-type: application/json
      jq: .actual[] | select(.name == "current_l3") | .value

  powers:
    - source: http
      uri: {{ include "uri" . }}
      headers:
        - content-type: application/json
      jq: >
        ((.actual[] | select(.name == "power_delivered_l1") | .value) * 1000)
        - ((.actual[] | select(.name == "power_returned_l1") | .value) * 1000)
    - source: http
      uri: {{ include "uri" . }}
      headers:
        - content-type: application/json
      jq: >
        ((.actual[] | select(.name == "power_delivered_l2") | .value) * 1000)
        - ((.actual[] | select(.name == "power_returned_l2") | .value) * 1000)
    - source: http
      uri: {{ include "uri" . }}
      headers:
        - content-type: application/json
      jq: >
        ((.actual[] | select(.name == "power_delivered_l3") | .value) * 1000)
        - ((.actual[] | select(.name == "power_returned_l3") | .value) * 1000)
