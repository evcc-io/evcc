template: goodwe-wifi-dt
requirements:
  evcc: ["skiptest"]
products:
  - brand: GoodWe
    description:
      generic: SDT/DT Inverter (WiFi)
params:
  - name: usage
    choice: ["pv"]
  - name: host
render: |
  type: custom
  power:
    source: aa55udp
    host: {{ .host }}
    register: 30127
    count: 2
    decode: int32be
  energy:
    source: aa55udp
    host: {{ .host }}
    register: 30145
    count: 2
    decode: uint32be
    scale: 0.1
