template: deye-hybrid-3p
products:
  - brand: Deye
    description:
      generic: 3phase low/high voltage hybrid inverter
  - brand: Sunsynk
    description:
      generic: 3phase low/high voltage hybrid inverter
capabilities: ["battery-control"]
params:
  - name: usage
    choice: ["grid", "pv", "battery"]
  - name: modbus
    choice: ["rs485", "tcpip"]
    baudrate: 9600
    id: 1
  - name: maxacpower
  - name: storageunit
    help:
      de: Bei mehreren Speichereinheiten die zu überwachende Einheit auswählen
      en: Select the storage unit to monitor if you have multiple units
  - preset: battery-params
  - name: batterytype
    choice: ["low voltage", "high voltage"]
    default: "low voltage"
    advanced: true
    description:
      de: Wechselrichter für LV- oder HV-Batterie
      en: Inverter for LV or HV batteries
    help:
      de: |
        "high voltage" für eine Hochvolt-Batterie mit Nennspannung über 60V verwenden
      en: |
        Choose "high voltage" if you are using a high voltage battery with a nominal voltage over 60V
  - name: maxdischargecurrent
    required: true
    default: 100
    advanced: true
    description:
      en: Max Discharge Current
      de: Max Entladestrom
    help:
      en: |
        Maximum battery discharge current in Amperes (A) for normal mode. Typical range 50-350A depending on battery capacity.
        Power calculation: P(W) = Current(A) x Voltage(V). Example with 48V battery: 100A x 48V = 4800W (4.8kW).
      de: |
        Maximaler Batterieentladestrom in Ampere (A) für Normalmodus. Typischer Bereich 50-350A abhängig von Batteriekapazität.
        Leistungsberechnung: P(W) = Strom(A) x Spannung(V). Beispiel mit 48V Batterie: 100A x 48V = 4800W (4,8kW).
  - name: gridchargecurrent
    required: true
    default: 60
    advanced: true
    description:
      en: Grid Charge Current
      de: Netzladestrom
    help:
      en: |
        Maximum battery charging current in Amperes (A) from grid for charge mode. Typical range 30-350A depending on battery and inverter capacity.
        Power calculation: P(W) = Current(A) x Voltage(V). Example with 48V battery: 60A x 48V = 2880W (2.9kW).
      de: |
        Maximaler Batterieladestrom in Ampere (A) aus dem Netz für Lademodus. Typischer Bereich 30-350A abhängig von Batterie- und Wechselrichterkapazität.
        Leistungsberechnung: P(W) = Strom(A) x Spannung(V). Beispiel mit 48V Batterie: 60A x 48V = 2880W (2,9kW).
  - name: includegenport
    type: bool
    advanced: true
    description:
      de: GEN-Anschluss als Solar-Eingang verwenden
      en: Treat GEN port as solar input
    help:
      de: |
        Wenn aktiviert, wird der GEN-Anschluss des Wechselrichters als zusätzlicher Solar-Eingang behandelt. Dadurch werden die Leistung und Energie, die über den GEN-Port eingespeist werden, zum Gesamt-Solarertrag addiert.
      en: |
        When enabled, the GEN port of the inverter will be treated as an additional solar input. This will add the power and energy fed in through the GEN port to the total solar yield. 
  - name: firmware1098
    type: bool
    advanced: true
    description:
      de: Firmware 1098 oder neuer (nur für HV Versionen)
      en: Firmware 1098 or newer (only for HV versions)
    help:
      de: |
        Nach einem Firmware-Update haben einige Registerwerte für Hochvolt-Batterien ihren Skalierungsfaktor geändert. Wenn der Wechselrichter die Firmware-Version 1098 oder neuer hat, muss diese Option aktiviert werden, um korrekte Werte zu erhalten.  
      en: |
        After a firmware update of the high voltage inverter, some register values of high voltage batteries have changed their scaling factor. If your inverter has firmware version 1098 or newer, you need to enable this option to get correct values.
render: |
  type: custom
  {{- if eq .usage "grid" }}
  power:
    source: modbus
    {{- include "modbus" . | indent 2 }}
    register:
      address: 625 # Grid side total power
      type: holding
      decode: int16
  energy:
    source: modbus
    {{- include "modbus" . | indent 2 }}
    register:
      address: 522 # "Total_GridBuy_Power Wh"
      type: holding
      decode: uint32s
    {{- if ne .firmware1098 "true" }}
    scale: 0.1
    {{- end }}      
  currents:
    - source: modbus
      {{- include "modbus" . | indent 4 }}
      register:
        address: 613 # "Out-of-grid - current A"
        type: holding
        decode: int16
      scale: 0.01
    - source: modbus
      {{- include "modbus" . | indent 4 }}
      register:
        address: 614 # "Out-of-grid - current B"
        type: holding
        decode: int16
      scale: 0.01
    - source: modbus
      {{- include "modbus" . | indent 4 }}
      register:
        address: 615 # "Out-of-grid - current C"
        type: holding
        decode: int16
      scale: 0.01
  {{- end }}
  {{- if eq .usage "pv" }}
  power:
    source: calc
    add:
    - source: modbus
      {{- include "modbus" . | indent 4 }}
      register:
        address: 672 # "PV1 input power"
        type: holding
        decode: uint16
      {{- if eq .batterytype "high voltage" }}  
      scale: 10
      {{- end }}
    - source: modbus
      {{- include "modbus" . | indent 4 }}
      register:
        address: 673 # "PV2 input power"
        type: holding
        decode: uint16
      {{- if eq .batterytype "high voltage" }}  
      scale: 10
      {{- end }}
    - source: modbus
      {{- include "modbus" . | indent 4 }}
      register:
        address: 674 # "PV3 input power"
        type: holding
        decode: uint16
      {{- if eq .batterytype "high voltage" }}  
      scale: 10
      {{- end }}
    - source: modbus
      {{- include "modbus" . | indent 4 }}
      register:
        address: 675 # "PV4 input power"
        type: holding
        decode: uint16
      {{- if eq .batterytype "high voltage" }}  
      scale: 10
      {{- end }}
    {{- if eq .includegenport "true" }}
    - source: modbus
      {{- include "modbus" . | indent 4 }}
      register:
        address: 667 # "low word of input power at GEN-Port"
        type: holding
        decode: int16 # "value is actually a signed 32 bit value but high word is at reg 671
    {{- end }}
  energy:
    source: calc
    add:    
    - source: modbus
      {{- include "modbus" . | indent 4 }}
      register:
        address: 534 # "Total_PV_Power_Wh"
        type: holding
        decode: uint32s
      {{- if ne .firmware1098 "true" }}
      scale: 0.1
      {{- end }}
    {{- if eq .includegenport "true" }}
    - source: modbus
      {{- include "modbus" . | indent 4 }}
      register:
        address: 537 # "Total_Gen_Power_Wh"
        type: holding
        decode: int32s
      {{- if ne .firmware1098 "true" }}
      scale: 0.1
      {{- end }}
    {{- end }}
  maxacpower: {{ .maxacpower }}
  {{- end }}
  {{- if eq .usage "battery" }}
  power:
    source: modbus
    {{- include "modbus" . | indent 2 }}
    register:
      {{- if eq .storageunit "1" }}
      address: 590 # "Battery output power"
      {{- end }}
      {{- if eq .storageunit "2" }}
      address: 595 # "Battery2 output power"
      {{- end }}
      type: holding
      decode: int16
  {{- if eq .batterytype "high voltage" }}  
    scale: 10
  {{- end }}
  energy:
    source: modbus
    {{- include "modbus" . | indent 2 }}
    register:
      address: 518 # "Total discharge of the battery (Wh)"
      type: holding
      decode: uint32s
    {{- if ne .firmware1098 "true" }}
    scale: 0.1
    {{- end }}
  soc:
    source: modbus
    {{- include "modbus" . | indent 2 }}
    register:
      {{- if eq .storageunit "1" }}
      address: 588 # "battery capacity"
      {{- end }}
      {{- if eq .storageunit "2" }}
      address: 589 # "battery2 capacity"
      {{- end }}
      type: holding
      decode: uint16
  batterymode:
    source: switch
    switch:
    - case: 1 # normal
      set:
        source: sequence
        set:
        - source: const
          value: {{ .minsoc }}
          set:
            source: modbus
            {{- include "modbus" . | indent 10 }}
            register:
              address: 127 # Battery Grid Charging Start (set to minsoc)
              type: writemultiple
              decode: uint16
        - source: const
          value: {{ .minsoc }}
          set:
            source: modbus
            {{- include "modbus" . | indent 10 }}
            register:
              address: 166 # Program 1 SOC
              type: writemultiple
              decode: uint16
        - source: const
          value: {{ .minsoc }}
          set:
            source: modbus
            {{- include "modbus" . | indent 10 }}
            register:
              address: 167 # Program 2 SOC
              type: writemultiple
              decode: uint16
        - source: const
          value: {{ .minsoc }}
          set:
            source: modbus
            {{- include "modbus" . | indent 10 }}
            register:
              address: 168 # Program 3 SOC
              type: writemultiple
              decode: uint16
        - source: const
          value: {{ .minsoc }}
          set:
            source: modbus
            {{- include "modbus" . | indent 10 }}
            register:
              address: 169 # Program 4 SOC
              type: writemultiple
              decode: uint16
        - source: const
          value: {{ .minsoc }}
          set:
            source: modbus
            {{- include "modbus" . | indent 10 }}
            register:
              address: 170 # Program 5 SOC
              type: writemultiple
              decode: uint16
        - source: const
          value: {{ .minsoc }}
          set:
            source: modbus
            {{- include "modbus" . | indent 10 }}
            register:
              address: 171 # Program 6 SOC
              type: writemultiple
              decode: uint16
        - source: const
          value: 1 # enabled
          set:
            source: modbus
            {{- include "modbus" . | indent 10 }}
            register:
              address: 130 # Battery Grid Charging
              type: writemultiple
              decode: uint16
        - source: const
          value: 0x00FF # Week, enable TOU
          set:
            source: modbus
            {{- include "modbus" . | indent 10 }}
            register:
              address: 146 # Time of Use
              type: writemultiple
              decode: uint16
        - source: const
          value: {{ .maxdischargecurrent }}
          set:
            source: modbus
            {{- include "modbus" . | indent 10 }}
            register:
              address: 109 # Battery Max Discharging Current
              type: writemultiple
              decode: uint16
    - case: 2 # hold - prevent discharge
      set:
        source: sequence
        set:
        - source: const
          value: {{ .minsoc }}
          set:
            source: modbus
            {{- include "modbus" . | indent 10 }}
            register:
              address: 127 # Battery Grid Charging Start (set to minsoc)
              type: writemultiple
              decode: uint16
        - source: const
          value: {{ .minsoc }}
          set:
            source: modbus
            {{- include "modbus" . | indent 10 }}
            register:
              address: 166 # Program 1 SOC
              type: writemultiple
              decode: uint16
        - source: const
          value: {{ .minsoc }}
          set:
            source: modbus
            {{- include "modbus" . | indent 10 }}
            register:
              address: 167 # Program 2 SOC
              type: writemultiple
              decode: uint16
        - source: const
          value: {{ .minsoc }}
          set:
            source: modbus
            {{- include "modbus" . | indent 10 }}
            register:
              address: 168 # Program 3 SOC
              type: writemultiple
              decode: uint16
        - source: const
          value: {{ .minsoc }}
          set:
            source: modbus
            {{- include "modbus" . | indent 10 }}
            register:
              address: 169 # Program 4 SOC
              type: writemultiple
              decode: uint16
        - source: const
          value: {{ .minsoc }}
          set:
            source: modbus
            {{- include "modbus" . | indent 10 }}
            register:
              address: 170 # Program 5 SOC
              type: writemultiple
              decode: uint16
        - source: const
          value: {{ .minsoc }}
          set:
            source: modbus
            {{- include "modbus" . | indent 10 }}
            register:
              address: 171 # Program 6 SOC
              type: writemultiple
              decode: uint16
        - source: const
          value: 0x00FF # Week, enable TOU
          set:
            source: modbus
            {{- include "modbus" . | indent 10 }}
            register:
              address: 146 # Time of Use
              type: writemultiple
              decode: uint16
        - source: const
          value: 0
          set:
            source: modbus
            {{- include "modbus" . | indent 10 }}
            register:
              address: 109 # Battery Max Discharging Current
              type: writemultiple
              decode: uint16
    - case: 3 # charge - enable grid charging
      set:
        source: sequence
        set:
        - source: const
          value: {{ .gridchargecurrent }}
          set:
            source: modbus
            {{- include "modbus" . | indent 10 }}
            register:
              address: 128 # Battery Grid Charging Current
              type: writemultiple
              decode: uint16
        - source: const
          value: {{ .maxsoc }}
          set:
            source: modbus
            {{- include "modbus" . | indent 10 }}
            register:
              address: 127 # Battery Grid Charging Start (SOC target)
              type: writemultiple
              decode: uint16
        - source: const
          value: 1 # enabled
          set:
            source: modbus
            {{- include "modbus" . | indent 10 }}
            register:
              address: 130 # Battery Grid Charging
              type: writemultiple
              decode: uint16
        - source: const
          value: 0x0000 # Disabled, ignore TOU schedule
          set:
            source: modbus
            {{- include "modbus" . | indent 10 }}
            register:
              address: 146 # Time of Use
              type: writemultiple
              decode: uint16
        - source: const
          value: {{ .maxdischargecurrent }}
          set:
            source: modbus
            {{- include "modbus" . | indent 10 }}
            register:
              address: 109 # Battery Max Discharging Current
              type: writemultiple
              decode: uint16
  {{- include "battery-params" . }}
  {{- end }}
