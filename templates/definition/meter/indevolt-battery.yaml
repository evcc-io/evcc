template: indevolt-battery
products:
  - brand: Indevolt
    description:
      generic: SolidFlex 2000 Eco
  - brand: Indevolt
    description:
      generic: SolidFlex 3000 AC
  - brand: Indevolt
    description:
      generic: PowerFlex 2000 Eco
  - brand: Indevolt
    description:
      generic: PowerFlex 3000 AC
capabilities: ["battery-control"]
requirements:
  description:
    de: |
      Lokaler Direktzugriff auf Indevolt-Batteriespeicher (Non-PV Varianten) per HTTP API auf Port 8080.

      Die IP-Adresse des Geräts kann in der Indevolt-App, im Router oder per UDP-Broadcast (Port 10000) ermittelt werden. Es empfiehlt sich, dem Gerät im Router eine feste IP zuzuweisen.

      Vorzeichenkonvention der Batterieleistung sowie Verfügbarkeit eines Netzbezugs-/-einspeisepunktes (Register 2101/2108) hängen von der Installation (CT-Klemme) ab und sind ggf. zu prüfen.

      Siehe [docs.indevolt.com](https://docs.indevolt.com/docs/hardware/geek/open-data/).
    en: |
      Local direct access to Indevolt battery storage devices (Non-PV variants) via HTTP API on port 8080.

      The device's IP address can be obtained from the Indevolt app, the router, or via UDP broadcast (port 10000). Assigning a static IP in the router is recommended.

      Battery power sign convention and availability of grid import/export readings (registers 2101/2108) depend on installation (CT clamp) and should be verified.

      See [docs.indevolt.com](https://docs.indevolt.com/docs/hardware/geek/open-data/).
params:
  - name: usage
    choice: ["grid", "battery"]
  - name: host
  - name: user
    advanced: true
  - name: password
    advanced: true
  - name: cache
    default: 5s
  - preset: battery-params
  - name: maxchargepower
    default: 2400
    help:
      en: Maximum charge power (W). Valid range 50-3000, depending on your device.
      de: Maximale Ladeleistung (W). Gültiger Bereich 50-3000, abhängig von Ihrem Gerät.
render: |
  {{- define "auth" }}
  {{- if .user }}
  auth:
    type: digest
    user: {{ .user }}
    password: {{ .password }}
  {{- end }}
  {{- end }}
  type: custom
  {{- if eq .usage "grid" }}
  power:
    source: http
    uri: http://{{ .host }}:8080/rpc/Indevolt.GetData?config={{ urlEncode `{"t":[2101,2108]}` }}
    method: POST
    {{- include "auth" . | indent 2 }}
    jq: ."2101" - ."2108" # AC Input Power minus AC Output Power
    cache: {{ .cache }}
  energy:
    source: http
    uri: http://{{ .host }}:8080/rpc/Indevolt.GetData?config={{ urlEncode `{"t":[2107]}` }}
    method: POST
    {{- include "auth" . | indent 2 }}
    jq: ."2107" # Total AC Input Energy (kWh)
    cache: {{ .cache }}
  {{- end }}
  {{- if eq .usage "battery" }}
  power:
    # cJSON Point 6000 — Battery Power (W, Float)
    # Positive = charging, negative = discharging (matches evcc convention).
    source: http
    uri: http://{{ .host }}:8080/rpc/Indevolt.GetData?config={{ urlEncode `{"t":[6000]}` }}
    method: POST
    {{- include "auth" . | indent 2 }}
    jq: ."6000"
    cache: {{ .cache }}
  soc:
    # cJSON Point 6002 = Battery SOC Total (%, Float)
    source: http
    uri: http://{{ .host }}:8080/rpc/Indevolt.GetData?config={{ urlEncode `{"t":[6002]}` }}
    method: POST
    {{- include "auth" . | indent 2 }}
    jq: ."6002"
    cache: {{ .cache }}
  energy:
    # cJSON Point 6007 — Battery Total Discharging Energy (kWh, Num)
    source: http
    uri: http://{{ .host }}:8080/rpc/Indevolt.GetData?config={{ urlEncode `{"t":[6007]}` }}
    method: POST
    {{- include "auth" . | indent 2 }}
    jq: ."6007"
    cache: {{ .cache }}
  batterymode:
    source: switch
    switch:
      - case: 1 # normal
        set:
          source: sequence
          set:
            # Step 1: Set Mode to Self-consumed Prioritized (47005=1), which is the default for this battery
            - source: http
              uri: "http://{{ .host }}:8080/rpc/Indevolt.SetData?config={\"f\":16,\"t\":47005,\"v\":[1]}"
              method: POST
              {{- include "auth" . | indent 14 }}
              jq: .result
            # Step 2: Also Set Grid Charging Setting to Disable (1143=0) to enable normal operation
            - source: http
              uri: "http://{{ .host }}:8080/rpc/Indevolt.SetData?config={\"f\":16,\"t\":1143,\"v\":[0]}"
              method: POST
              {{- include "auth" . | indent 14 }}
              jq: .result
      - case: 2 # hold power
        set:
          source: sequence
          set:
            # Step 1: Set Mode to Real-time control (47005=4), which is necessary to write State Setting (Step 2)
            - source: http
              uri: "http://{{ .host }}:8080/rpc/Indevolt.SetData?config={\"f\":16,\"t\":47005,\"v\":[4]}"
              method: POST
              {{- include "auth" . | indent 14 }}
              jq: .result
            # Step 2: Set State Setting to Standby (47015=0), additionally adjusting power and SOC to valid values to avoid API rejections
            # API validity: documented ranges are power 50 to 2400 W (47016)
            - source: http
              uri: "http://{{ .host }}:8080/rpc/Indevolt.SetData?config={\"f\":16,\"t\":47015,\"v\":[0,50,{{ .minsoc }}]}"
              method: POST
              {{- include "auth" . | indent 14 }}
              jq: .result
      - case: 3 # charge
        set:
          source: sequence
          set:
            # Step 1: Set Mode to Real-time control (47005=4), which is necessary to write State Setting (Step 3)
            - source: http
              uri: "http://{{ .host }}:8080/rpc/Indevolt.SetData?config={\"f\":16,\"t\":47005,\"v\":[4]}"
              method: POST
              {{- include "auth" . | indent 14 }}
              jq: .result
            # Step 2: Set Grid Charging Setting to Charging (1143=1)
            - source: http
              uri: "http://{{ .host }}:8080/rpc/Indevolt.SetData?config={\"f\":16,\"t\":1143,\"v\":[1]}"
              method: POST
              {{- include "auth" . | indent 14 }}
              jq: .result
            # Step 3: Set State Setting to Charging (47015=1), additionally adjusting power and SOC to valid values, which is required by the API
            - source: http
              uri: "http://{{ .host }}:8080/rpc/Indevolt.SetData?config={\"f\":16,\"t\":47015,\"v\":[1,{{ .maxchargepower }},{{ .maxsoc }}]}"
              method: POST
              {{- include "auth" . | indent 14 }}
              jq: .result
    
  {{- include "battery-params" . }}
  {{- end }}
