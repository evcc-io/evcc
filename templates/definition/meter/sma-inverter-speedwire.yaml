template: sma-inverter-speedwire
covers: ["sma-inverter"]
products:
  - brand: SMA
    description:
      de: Wechselrichter / Hybrid-Wechselrichter (Speedwire)
      en: Inverter / Hybrid Inverter (Speedwire)
requirements:
  description:
    de: |
      Liest Werte über das SMA Speedwire-Protokoll aus.
      Bei Hybrid-Wechselrichtern (z. B. Sunny Tripower Smart Energy, Sunny Boy Storage)
      werden zusätzlich PV-/Netz-/Hausverbrauchs- und Batterie-Telemetriedaten in der
      Diagnoseausgabe (evcc meter --diagnose) sichtbar.
      Für aktive Batteriesteuerung den Modbus-basierten Eintrag SMA Smart Energy Hybrid
      Wechselrichter verwenden.
    en: |
      Reads values via the SMA Speedwire protocol.
      For hybrid inverters (e.g. Sunny Tripower Smart Energy, Sunny Boy Storage)
      additional PV/grid/consumption power and battery telemetry are exposed in
      the diagnostic output (evcc meter --diagnose).
      For active battery control use the Modbus-based SMA Smart Energy Hybrid
      Inverter template instead.
  evcc: ["skiptest"]
params:
  - name: usage
    choice: ["pv", "battery"]
  - name: host
  - name: password
    help:
      en: Password for user group Standard
      de: Passwort für Benutzergruppe Benutzer
  - preset: battery-params
render: |
  type: sma
  usage: {{ .usage }}
  uri: {{ .host }} # IP address or hostname
  password: {{ .password }} # optional
  {{- if eq .usage "battery" }}
  {{- include "battery-params" . }}
  {{- end }}
