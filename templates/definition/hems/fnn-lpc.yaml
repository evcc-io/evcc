template: fnn-lpc
products:
  - description:
      generic: FNN-Steuerbox (§ 14a EnWG)
params:
  - name: maxconsumptionpower
    type: float
    unit: W
    required: true
    description:
      en: Guaranteed minimum power (Pmin)
      de: Garantierte Mindestleistung (Pmin)
    help:
      en: Power limit applied to the root circuit while the limit is active.
      de: Leistungsbegrenzung des Hauptstromkreises während die Limitierung aktiv ist.
  - name: w4pin
    type: int
    required: true
    description:
      en: W4 GPIO pin
      de: W4 GPIO-Pin
    help:
      en: Input pin for the W4 signal (Dimmer for controllable loads)
      de: Eingangspin für das W4-Signal (Dimmen der steuerbaren Verbrauchseinrichtungen)
render: |
  type: fnn
  maxdimpower: {{ .maxconsumptionpower }}
  w4:
    source: gpio
    pin: {{ .w4pin }}
    function: read
