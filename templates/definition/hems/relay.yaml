template: relay
products:
  - description:
      generic: GPIO relay (LPC)
params:
  - name: maxpower
    type: float
    unit: W
    required: true
    description:
      en: Limited consumption power
      de: Limitierte Verbrauchsleistung
    help:
      en: Power limit applied to the root circuit while the limit is active.
      de: Leistungsbegrenzung des Hauptstromkreises während die Limitierung aktiv ist.
  - name: gpiopin
    type: int
    required: true
    description:
      en: GPIO pin
      de: GPIO-Pin
    help:
      en: Input pin wired to the relay contact
      de: Eingangspin, der mit dem Relaiskontakt verbunden ist
  - name: passthroughpin
    type: int
    advanced: true
    description:
      en: Passthrough GPIO pin
      de: Passthrough GPIO-Pin
    help:
      en: Output pin that mirrors the limit signal to an external system
      de: Ausgangspin, der das Limit-Signal an externe Systeme weiterleitet
render: |
  type: relay
  maxpower: {{ .maxpower }}
  limit:
    source: gpio
    pin: {{ .gpiopin }}
    function: read
  {{- if .passthroughpin }}
  passthrough:
    source: gpio
    pin: {{ .passthroughpin }}
    function: write
  {{- end }}
