template: openwb-2.0
products:
  - brand: openWB
    description:
      generic: Software 2.x
capabilities: ["1p3p", "mA", "rfid"]
requirements:
  description:
    de: |
      Erfordert [`Software 2.x`](https://github.com/openWB/core).
      Folgende Änderungen sind unter dem `Einstellungen`-Reiter erforderlich:

      * Steuerungsmodus: `secondary`
      * Steuerung über Modbus als secondary: `An`
    en: |
      Requires [`Software 2.x`](https://github.com/openWB/core).
      The following changes are necessary under the 'Einstellungen' tab:

      * Steuerungsmodus: `secondary`
      * Steuerung über Modbus als secondary: `An`
params:
  - name: modbus
    choice: ["tcpip"]
    port: 1502
    id: 1
  - name: connector
    default: 1
  - name: phases1p3p
    type: bool
    description:
      en: Charger is equipped with phase switching feature
      de: Phasenumschaltung vorhanden
    advanced: true
    default: true
  - name: httpFallback
    type: bool
    description:
      en: HTTP fallback for Pro+ (vehicle ID, SOC)
      de: HTTP-Fallback für Pro+ (Fahrzeug-ID, Ladezustand)
    help:
      en: Fetches vehicle ID and SOC via connect.php (same IP as Modbus, port 8080) when Modbus does not provide them. Only available on openWB-Pro+.
      de: Lädt Fahrzeug-ID und Ladezustand über connect.php (gleiche IP wie Modbus, Port 8080), wenn Modbus keine Daten liefert. Nur für openWB-Pro+.
    advanced: true
    default: false
render: |
  type: openwb-2.0
  {{- include "modbus" . }}
  connector: {{ .connector }}
  phases1p3p: {{ .phases1p3p }}
  httpFallback: {{ .httpFallback }}
