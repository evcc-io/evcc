template: spelsberg-smart-pro
products:
  - brand: Spelsberg
    description:
      generic: Wallbox Smart Pro
capabilities: ["rfid", "1p3p", "dim"]
requirements:
  description:
    de: |
      Der 'Modbus TCP Server für Energiemanagement-Systeme' muss aktiviert sein. 'Modbus TCP Server Registersatz' muss auf 'Open Modbus Charge Control Interface (OMCCI)' eingestellt sein. 'Modbus TCP Server UID-Übertragung erlauben' muss aktiviert sein. 

      Für Phasenumschaltung ist mindestens Firmware 5.33 notwendig. Die 'SEMP-Schnittstelle' muss aktiviert sein, der SEMP 'Lademodus' muss auf 'Surplus Charging' stehen. 'Softwarefunktion zur Steuerung der Phasenumschaltung' muss auf SEMP konfiguriert sein.
    en: |
      The 'Modbus TCP Server for energy management systems' must be enabled. The setting 'Modbus TCP Server Register Address Set' must be set to 'Open Modbus Charge Control Interface (OMCCI)'. Set 'Modbus TCP Server Allow UID Disclose' to On.

      Firmware 5.33 or higher is required for phase switching. The 'SEMP interface' must be enabled, the SEMP 'Charging Mode' must be set to 'Surplus Charging'. Set 'Software function to use phase switching' to SEMP.
  evcc: ["sponsorship"]
params:
  - name: modbus
    choice: ["tcpip"]
    id: 255
render: |
  type: bender
  {{- include "modbus" . }}
