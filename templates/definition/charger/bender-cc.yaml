capabilities: ["rfid", "dim"]
requirements:
  description:
    de: |
      Der 'Modbus TCP Server für Energiemanagement-Systeme' muss aktiviert sein. 'Registersatz' darf NICHT auf 'Phoenix' oder 'TQ-DM100' eingestellt sein. Die dritte Auswahlmöglichkeit 'Ebee', 'Bender', 'MENNEKES' etc. ist richtig. 'UID Übertragung erlauben' muss aktiviert sein.

      Manche Bender basierte Wallboxen können ggf. Phasenumschaltung unterstützen. Dafür muss die 'SEMP-Schnittstelle' aktiviert sein, und der SEMP 'Lademodus' muss auf 'Surplus Charging' stehen. 'Softwarefunktion zur Steuerung der Phasenumschaltung' muss auf SEMP konfiguriert sein.
    en: |
      The 'Modbus TCP Server' must be enabled. The setting 'Register Address Set' must NOT be set to 'Phoenix' or 'TQ-DM100'. Use the third selection labeled 'Ebee', 'Bender', 'MENNEKES' etc. Set 'Allow UID Disclose' to On.

      Some Bender based chargers may support phase switching. For this, the 'SEMP interface' must be enabled, and the SEMP 'Charging Mode' must be set to 'Surplus Charging'. Set 'Software function to use phase switching' to SEMP.
  evcc: ["sponsorship"]
params:
  - name: modbus
    choice: ["tcpip"]
    id: 255
render: |
  type: bender
  {{- include "modbus" . }}
