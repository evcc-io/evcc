template: delta
products:
  - brand: Delta
    description:
      generic: AC MAX Basic
  - brand: Delta
    description:
      generic: AC MAX Smart
  - brand: Delta
    description:
      generic: SLIM Charger
  - brand: Delta
    description:
      generic: Ultra Fast Charger
capabilities: ["mA", "rfid"]
requirements:
  evcc: ["sponsorship"]
  description:
    de: AC MAX Smart erfordert Firmware >= v01.26.38.02 für Modbus TCP via WiFi.
    en: AC MAX Smart requires firmware >= v01.26.38.02 for Modbus TCP via WiFi.
params:
  - name: modbus
    choice: ["rs485", "tcpip"]
    baudrate: 115200
  - name: connector
render: |
  type: delta
  {{- include "modbus" . }}
  connector: {{ .connector }}
