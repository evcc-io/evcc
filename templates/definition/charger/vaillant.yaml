template: vaillant
products:
  - brand: Vaillant
    description:
      generic: SensoNET (API)
group: heating
requirements:
  # evcc: ["sponsorship"]
  description:
    de: Die Boost Funktion erwärmt Warmwasser oder eine Boostzone. Die Boostzone wird durch die ID identifiziert. Die Boost Temperatur wird in Grad Celsius angegeben. Ist eine Boost Temperatur angegeben, wird die Boostzone aktiviert, anderenfalls Warmwasser. Achtung, wird der Warmwasser-Betriebsmodus der Anlage auf "Aus" gestellt, damit evcc das Warmwasser vollständig regelt, führt die Anlage ihren wöchentlichen Legionellenschutz nicht mehr aus. Sorge dann selbst für eine regelmäßige Aufheizung auf Desinfektionstemperatur (z. B. per Zeitprogramm oder erzwungenem Boost).
    en: The boost function heats hot water or a boost zone. The boost zone is identified by the ID. The boost temperature is specified in degrees Celsius. If boost temperature is specified, the boost zone is activated, otherwise hot water. Note, if the appliance's DHW operation mode is set to "off" so that evcc fully controls hot water, the appliance no longer runs its weekly legionella protection. Make sure to periodically heat the water to disinfection temperature yourself (e.g. via time program or a forced boost).
params:
  - name: user
  - name: password
  - name: realm
    type: choice
    choice:
      [
        "albania",
        "austria",
        "belgium",
        "bosnia",
        "bulgaria",
        "croatia",
        "cyprus",
        "czechrepublic",
        "denmark",
        "estonia",
        "finland",
        "france",
        "georgia",
        "germany",
        "greece",
        "hungary",
        "ireland",
        "italy",
        "kosovo",
        "latvia",
        "lithuania",
        "luxembourg",
        "moldavia",
        "netherlands",
        "new-zealand",
        "north-macedonia",
        "norway",
        "poland",
        "portugal",
        "romania",
        "serbia",
        "slovakia",
        "slovenia",
        "spain",
        "sweden",
        "switzerland",
        "turkiye",
        "ukraine",
        "unitedkingdom",
        "uzbekistan",
      ]
    default: germany
    description:
      de: Region
      en: Region
  - name: zone
    type: int
    description:
      de: ID der Boostzone
      en: Boost zone ID
  - name: setpoint
    type: float
    description:
      de: Boost Temperatur
      en: Boost temperature
  - name: system
    description:
      de: Name der Anlage
      en: Name of the system
    help:
      de: Notwendig falls mehrere Anlagen im Account vorhanden sind
      en: Required if multiple systems are present in the account
  - name: reboost
    type: duration
    default: 15m
    advanced: true
    description:
      de: Reboost-Intervall
      en: Reboost interval
    help:
      de: Wartezeit, nach der Boost erneut gestartet wird.
      en: Wait time after which Boost is started again.
  - name: hysteresis
    type: float
    unit: °C
    advanced: true
    description:
      de: Reboost Hysterese
      en: Reboost Hysteresis
  - name: phases
    deprecated: true
render: |
  type: vaillant
  user: {{ .user }}
  password: {{ .password }}
  realm: {{ if eq .realm "DE" -}} vaillant-germany-b2c {{ else if eq .realm "AT" -}} vaillant-austria-b2c {{ else }} vaillant-{{ .realm }}-b2c {{ end }}
  {{- if .system }}
  system: {{ .system }}
  {{- end }}
  heatingzone: {{ .zone }}
  heatingsetpoint: {{ .setpoint }}
  reboost: {{ .reboost }}
  hysteresis: {{ .hysteresis }}
