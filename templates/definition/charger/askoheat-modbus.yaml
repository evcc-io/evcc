template: askoheat-modbus
products:
  - brand: Askoma
    description:
      generic: ASKOHEAT+ (Modbus)
group: heating
requirements:
  description:
    de: |
      **Experimentell:** Diese Modbus-Variante ist noch nicht vollständig getestet. Bitte die JSON-API-Variante (Askoma ASKOHEAT+) bevorzugen.

      Der ASKOHEAT+ muss über Modbus TCP erreichbar sein (Port 502).
      Über das Webinterface sicherstellen, dass "Load Setpoint" im Input Setting aktiviert ist.

      **Wichtig:** Im Loadpoint-Setup `mincurrent` passend zur minimalen Heizstufe setzen, sowie `phases: 1` für einphasigen Betrieb konfigurieren.
    en: |
      **Experimental:** This Modbus variant is not yet fully tested. Please prefer the JSON API variant (Askoma ASKOHEAT+).

      The ASKOHEAT+ must be reachable via Modbus TCP (port 502).
      Ensure "Load Setpoint" is enabled in Input Settings via the web interface.

      **Important:** In the loadpoint configuration, set `mincurrent` to match the minimum heating step, and configure `phases: 1` for single-phase operation.
params:
  - name: host
  - name: port
    default: 502
  - name: id
    default: 1
  - name: tempsensor
    default: 0
    description:
      de: Temperatursensor (0-4)
      en: Temperature sensor (0-4)
render: |
  type: heatpump
  setmaxpower:
    source: modbus
    uri: {{ .host }}:{{ .port }}
    id: {{ .id }}
    register:
      address: 319
      type: writeholding
      decode: int16
  getmaxpower:
    source: modbus
    uri: {{ .host }}:{{ .port }}
    id: {{ .id }}
    register:
      address: 319
      type: holding
      decode: int16
  power:
    source: modbus
    uri: {{ .host }}:{{ .port }}
    id: {{ .id }}
    register:
      address: 317
      type: input
      decode: uint16
  temp:
    source: modbus
    uri: {{ .host }}:{{ .port }}
    id: {{ .id }}
    register:
      address: {{ add 100 (mul (int .tempsensor) 2) }}
      type: holding
      decode: uint16
  limittemp:
    source: modbus
    uri: {{ .host }}:{{ .port }}
    id: {{ .id }}
    register:
      address: 597
      type: holding
      decode: uint16
  icon: waterheater
  features:
    - heating
    - integrateddevice
