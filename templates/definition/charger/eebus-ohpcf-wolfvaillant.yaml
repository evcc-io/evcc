template: eebus-ohpcf-wolfvaillant
products:
  - brand: Wolf
    description:
      generic: CHA-Monoblock (07, 10, 16/20, 20/24 with EEBus)
  - brand: Wolf
    description:
      generic: FHA-Monoblock (EEBus)
  - brand: Wolf
    description:
      generic: EEBus
  - brand: Vaillant
    description:
      generic: aroTHERM plus (EEBus)
  - brand: Vaillant
    description:
      generic: EEBus
group: heating
capabilities: ["meter", "dim"]
params:
  - preset: eebus
  - name: reboost
    type: duration
    default: 10m
    advanced: true
    description:
      de: Reboost-Intervall
      en: Reboost interval
    help:
      de: Wartezeit, nach der eine neu angekündigte optionale Leistungsaufnahme erneut eingeplant wird.
      en: Wait time after which a newly announced optional power consumption is scheduled again.
render: |
  type: eebus-ohpcf
  {{ include "eebus" . }}
  reboost: {{ .reboost }}
  features:
    - heating
    - integrateddevice
