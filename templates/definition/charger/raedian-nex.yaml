template: raedian-nex
products:
  - brand: Raedian
    description:
      generic: NEX
params:
  - name: modbus
    choice: ["tcpip"]
render: |
  type: custom
  status:
    source: modbus
    {{- include "modbus" . | indent 2 }}
    register:
      address: 32780
      type: holding
      decode: uint32
    map:
      - 0: A
      - 1: B
      - 2: B
      - 3: C
      - 4: C
  maxcurrent:
    source: modbus
    {{- include "modbus" . | indent 2 }}
    register:
      address: 33024
      type: holding
      decode: uint32
    scale: 0.001
  enable:
    source: modbus
    {{- include "modbus" . | indent 2 }}
    register:
      address: 33029
      type: holding
      decode: uint16
    map:
      - 0: true
      - 1: false
  chargepower:
    source: modbus
    {{- include "modbus" . | indent 2 }}
    register:
      address: 32796
      type: holding
      decode: uint32
  totalenergy:
    source: modbus
    {{- include "modbus" . | indent 2 }}
    register:
      address: 32798
      type: holding
      decode: uint32
    scale: 0.001
  currents:
    - source: modbus
      {{- include "modbus" . | indent 4 }}
      register:
        address: 32784
        type: holding
        decode: uint32
      scale: 0.001
    - source: modbus
      {{- include "modbus" . | indent 4 }}
      register:
        address: 32786
        type: holding
        decode: uint32
      scale: 0.001
    - source: modbus
      {{- include "modbus" . | indent 4 }}
      register:
        address: 32788
        type: holding
        decode: uint32
      scale: 0.001
  voltages:
    - source: modbus
      {{- include "modbus" . | indent 4 }}
      register:
        address: 32790
        type: holding
        decode: uint32
      scale: 0.1
    - source: modbus
      {{- include "modbus" . | indent 4 }}
      register:
        address: 32792
        type: holding
        decode: uint32
      scale: 0.1
    - source: modbus
      {{- include "modbus" . | indent 4 }}
      register:
        address: 32794
        type: holding
        decode: uint32
      scale: 0.1
