template: dadapower
products:
  - brand: Dadapower
    description:
      generic: Premium Wallbox
  - brand: Dadapower
    description:
      generic: Premium Ladestation
capabilities: ["iso151182", "mA", "rfid", "1p3p", "meter", "dim"]
requirements:
  evcc: ["sponsorship"]
params:
  - name: modbus
    choice: ["tcpip"]
  - name: connector
render: |
  type: dadapower
  {{- include "modbus" . }}
  connector: {{ .connector }}
