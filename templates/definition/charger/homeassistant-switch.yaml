template: homeassistant-switch
products:
  - brand: Home Assistant
    description:
      generic: Switch
group: switchsockets
requirements:
  evcc: ["skiptest"]
  description:
    en: Home Assistant instances in your network will be auto-discovered and suitable entities (e.g. `switch.*`, `sensor.*`) will be suggested.
    de: Home Assistant Instanzen in deinem Netzwerk werden automatisch erkannt und passende Entitäten (z.B. `switch.*`, `sensor.*`) werden vorgeschlagen.
auth:
  type: homeassistant
  params: [uri, insecure]
params:
  - name: uri
    description:
      de: Home Assistant URI
      en: Home Assistant URI
    example: http://homeassistant.local:8123
    help:
      en: " " # overwrite default
      de: " " # overwrite default
    service: homeassistant/instances
    required: true
  - name: token
    deprecated: true
  - name: home
    deprecated: true
  - name: insecure
  - name: switch
    description:
      de: Entity ID des schaltbaren Geräts
      en: Entity ID of the switch device
    service: homeassistant/entities?uri={uri}&insecure={insecure}&domain=switch
    example: switch.smartsocket
    required: true
  - name: power
    description:
      de: Entity ID für Leistungsmessung
      en: Entity ID for power measurement
    service: homeassistant/entities?uri={uri}&insecure={insecure}&domain=sensor
    example: sensor.smartsocket_power
  - name: temp
    description:
      de: Entity ID für Temperaturmessung
      en: Entity ID for temperature measurement
    help:
      de: Nur für Heizgeräte
      en: Heating devices only
    service: homeassistant/entities?uri={uri}&insecure={insecure}&domain=sensor
    example: sensor.heatpump_temperature
    advanced: true
  - name: limittemp
    description:
      de: Entity ID für Temperaturbegrenzung
      en: Entity ID for temperature limit
    help:
      de: Im Gerät konfigurierte Begrenzung, nur für Heizgeräte
      en: Limit configured in the device, heating devices only
    service: homeassistant/entities?uri={uri}&insecure={insecure}&domain=sensor
    example: sensor.heatpump_target_temperature
    advanced: true
  - preset: switchsocket
render: |
  type: switchsocket
  enabled:
    source: homeassistant
    uri: {{ .uri }}
    home: {{ .home }} # deprecated
    insecure: {{ .insecure }}
    entity: {{ .switch }}
  enable:
    source: homeassistant
    uri: {{ .uri }}
    home: {{ .home }} # deprecated
    insecure: {{ .insecure }}
    entity: {{ .switch }}
  {{- if .power }}
  power:
    source: homeassistant
    uri: {{ .uri }}
    home: {{ .home }} # deprecated
    insecure: {{ .insecure }}
    entity: {{ .power }}
  {{- end }}
  {{- if .temp }}
  temp:
    source: homeassistant
    uri: {{ .uri }}
    home: {{ .home }} # deprecated
    insecure: {{ .insecure }}
    entity: {{ .temp }}
  {{- end }}
  {{- if .limittemp }}
  limittemp:
    source: homeassistant
    uri: {{ .uri }}
    home: {{ .home }} # deprecated
    insecure: {{ .insecure }}
    entity: {{ .limittemp }}
  {{- end }}
  {{ include "switchsocket" . }}
