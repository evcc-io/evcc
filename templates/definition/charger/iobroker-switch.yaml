template: iobroker-switch
products:
  - brand: Iobroker
    description:
      generic: Switch
group: switchsockets
requirements:
  evcc: ["skiptest"]
  description:
    en: Iobroker entities can be addressed. You need a valid Iobroker configuration
    de: Iobroker Geräte können hier angesprochen werden. Es wird eine Iobroker Instanz benötigt.
params:
  - name: iobroker
    description:
      de: Name der zu benutzenden Iobroker Instanz
      en: Name of the Iobroker instance to be used
    example: My-Iobroker
    help:
      en: " " # overwrite default
      de: " " # overwrite default
  - name: switch
    description:
      de: Entity ID des schaltbaren Geräts
      en: Entity ID of the switch device
    example: shelly.0.shellyplugmg3#08154711#1.Relay0.Switch
    required: true
  - name: power
    description:
      de: Entity ID für Leistungsmessung
      en: Entity ID for power measurement
    example: shelly.0.shellyplugmg3#08154711#1.Relay0.Power
  - preset: switchsocket
render: |
  type: iobroker-switch
  iobroker: {{ .iobroker }}
  enable: {{ .switch }}
  power: {{ .power }}
  {{ include "switchsocket" . }}
