template: ac-elwa-e
products:
  - brand: my-PV
    description:
      generic: AC ELWA-E
capabilities: ["meter"]
group: heating
requirements:
description:
    de: |
    Über das lokale Webinterface des AC ELWA 2 muss der Wert für die "Zeitablauf Ansteuerung" auf einen Wert etwas größer der Intervall Zeit von evcc (z.B. + 5s) gesetzt werden. 
    Ansteuerungsytp "Modbus TCP" verwenden und minimalen Strom im Ladepunkt auf 0,125A setzen.
    en: |
    Use the local web interface of AC ELWA 2 to set the value "Power timeout" to a value slightly higher (e.g. + 5s) than the interval time of evcc.
    Use control type "Modbus TCP" and set loadpoint minimal current to 0.125A.
params:
  - name: modbus
    choice: ["tcpip"]
  - name: scale
    type: float
    default: 1
    description:
      en: "Scale factor for power limit"
      de: "Skalierungsfaktor der Leistungsvorgabe"
render: |
  type: ac-elwa-e
  {{- include "modbus" . }}
  scale: {{ .scale }}
