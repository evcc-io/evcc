template: nexblue
products:
  - brand: Nexblue
    description:
      generic: Edge 2
capabilities: ["1p3p"]
requirements:
  evcc: ["sponsorship"]
params:
  - name: user
    required: true
    help:
      de: Emailadresse des Nexblue-Accounts
      en: Nexblue account email address
  - name: password
    required: true
    help:
      de: Passwort des Nexblue-Accounts
      en: Nexblue account password
  - name: serial
    help:
      de: Seriennummer der Wallbox (wird automatisch erkannt, wenn nur eine Wallbox im Account vorhanden ist)
      en: Charger serial number (auto-detected if only one charger in account)
render: |
  type: nexblue
  user: {{ .user }}
  password: {{ .password }}
  serial: {{ .serial }}
