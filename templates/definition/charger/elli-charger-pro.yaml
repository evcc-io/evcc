template: ellipro
products:
  - brand: Elli
    description:
      generic: Charger Pro
  - brand: Volkswagen
    description:
      generic: ID. Charger Pro
  - brand: Skoda
    description:
      generic: iV Charger Connect+
  - brand: Cupra
    description:
      generic: Charger Pro
  - brand: Audi
    description:
      generic: Wallbox pro
capabilities: ["mA", "meter", "dim"]
requirements:
  description:
    de: |
      Dem Gerät muss eine feste IP Adresse zugewiesen sein (Manuell oder per DHCP).

      Eine Identifikation des Fahrzeugs über die RFID Karte ist nicht möglich.

      Wichtig: Die möglichst reibungslose Funktionalität ist aufgrund von Software-Fehlern in der Wallbox nur mit einem externen Energiezähler und ohne Stromwandlerspulen möglich! Eine LAN Anbindung wird sehr empfohlen.
    en: |
      The device has to have a fix IP address (manuall or via DHCP).

      The identification of a vehicle using the RFID card is not possible.

      Important: A mostly flawless functionality can only be provided with an external energy meter and no usage of CT coils, due to sosftware bugs of the Wallbox.  Using a LAN connection is highly recommended.
caveats:
  - description:
      de: "Viele bekannte EEBUS-Firmware-Fehler, die der Hersteller nicht behebt: Ladewerte können unzuverlässig sein und die Verbindung bricht häufig ab. Ein externer Zähler ist erforderlich."
      en: "Many known EEBUS firmware bugs that the manufacturer will not fix: charging measurements can be unreliable and the connection drops frequently. An external meter is required."
    link: https://github.com/evcc-io/evcc/discussions/15367
params:
  - preset: eebus
  - name: ip
render: |
  {{ include "eebus" . }}
  meter: true
  chargedEnergy: false
