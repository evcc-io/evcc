template: openwbhw
products:
  - brand: openWB
    description:
      generic: Embedded software replacement
capabilities: ["1p3p", "rfid", "mA"]
requirements:
  description:
    de: |
      Ersatz für die OpenWB Software, wenn evcc direkt auf der OpenWB Hardware läuft.

      Installation ohne Display:
      - RaspberryPi Image installieren und konfigurieren.
      - Folgendes am Ende von `/boot/firmware/config.txt` hinzufügen:
        ```
        [all]
        gpio=4,5,7,11,17,22,23,24,25,26,27=op,dl
        gpio=6,8,9,10,12,13,16,21=ip,pu
        ```
      - evcc nach Anleitung installieren und konfigurieren.

      Zusätzlich für die Anzeige von EVCC im Display:
      - `apt install labwc wayfire seatd xdg-user-dirs firefox`
      - Datei `.config/labwc/autostart` mit folgendem Inhalt anlegen:
        ```bash
        /usr/bin/firefox --kiosk http://localhost:7070/ &
        /usr/bin/swayidle -w timeout 600 'wlopm --off \*' resume 'wlopm --on \*' &
        ```
      - Als root: Auto login aktivieren: `loginctl enable-linger pi`
    en: |
      Replacement for the OpenWB software, when evcc runs directly on the OpenWB hardware
      Installation without display:
      - Install and configure RaspberryPi Image.
      - Add the following at then end of `/boot/firmware/config.txt`:
        ```
        [all]
        gpio=4,5,7,11,17,22,23,24,25,26,27=op,dl
        gpio=6,8,9,10,12,13,16,21=ip,pu
        ```
      - Install and configure evcc according to the manual.

      Additional steps for showing evcc on the display:
      - `apt install labwc wayfire seatd xdg-user-dirs firefox`
      - Create the file `.config/labwc/autostart` with the following contents:
        ```bash
        /usr/bin/firefox --kiosk http://localhost:7070/ &
        /usr/bin/swayidle -w timeout 600 'wlopm --off \*' resume 'wlopm --on \*' &
        ```
      - As root: Enable auto login: `loginctl enable-linger pi`
params:
  - name: modbus
    choice: ["rs485"]
    baudrate: 9600
    comset: 8N1
  - name: milliamps
    type: bool
    description:
      en: Enable mA support?
      de: Aktivieren der mA-Unterstützung?
    help:
      en: Enable or disable milliampere support, if hardware supports it
      de: Aktivieren oder Deaktivieren der Milliampere-Unterstützung, wenn die Hardware dies unterstützt
    default: true
  - name: phases1p3p
    type: bool
    description:
      en: Phase switching?
      de: Phasenumschaltung?
    help:
      en: Device is equipped with phase switching option?
      de: Gerät ist mit Phasenumschaltungsoption ausgestattet?
    default: false
  - name: rfid
    type: bool
    description:
      en: RFID reader?
      de: RFID-Kartenleser?
    help:
      en: RFID card reader is present?
      de: RFID-Kartenleser ist vorhanden?
    default: false
render: |
  type: openwbhw
  milliamps: {{ .milliamps }}
  phases1p3p: {{ .phases1p3p }}
  rfid: {{ .rfid }}
  {{- include "modbus" . }}
