template: eebus-ohpcf
products:
  - description:
      de: EEBUS Wärmepumpe (OHPCF)
      en: EEBUS heat pump (OHPCF)
group: heating
capabilities: ["meter"]
params:
  - preset: eebus
  - name: reboost
    type: duration
    default: 10m
    advanced: true
    description:
      de: Reboost-Intervall
      en: Reboost interval
    help:
      de: Wartezeit, nach der eine neu angekündigte optionale Leistungsaufnahme erneut eingeplant wird.
      en: Wait time after which a newly announced optional power consumption is scheduled again.
render: |
  type: eebus-ohpcf
  ski: {{ .ski }}
  {{ if .ip }}ip: {{ .ip }}{{ end }}
  reboost: {{ .reboost }}
  features:
    - heating
    - integrateddevice
