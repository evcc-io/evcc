template: phoenix-ev-eth
covers: ["wallbe", "wallbe-meter", "wallbe-pre2019", "wallbe-pre2019-meter"]
products:
  - brand: Phoenix Contact
    description:
      generic: EV-CC-AC1-M3-CBC-RCM-ETH
  - brand: Phoenix Contact
    description:
      generic: EV-CC-AC1-M3-CBC-RCM-ETH-3G
  - brand: Phoenix Contact
    description:
      generic: EV-CC-AC1-M3-RCM-ETH-XP
  - brand: Phoenix Contact
    description:
      generic: EV-CC-AC1-M3-RCM-ETH-3G-XP
  - brand: Wallbe
    description:
      generic: Eco
  - brand: Wallbe
    description:
      generic: Eco 2.0(s)
  - brand: Wallbe
    description:
      generic: Pro
  - brand: ESL
    description:
      generic: Walli LIGHT
  - brand: E3/DC
    description:
      generic: Easy Connect
  - brand: Compleo
    description:
      generic: Pro
capabilities: ["mA", "rfid", "dim"]
requirements:
  description:
    en: DIP switch 10 at the controller needs to be set to 'ON'. A recent controller firmware is recommended.
    de: DIP Schalter 10 des Controllers muss auf 'ON' gestellt sein. Eine aktuelle Controller-Firmware wird empfohlen.
  evcc: ["sponsorship"]
params:
  - name: modbus
    choice: ["tcpip"]
    id: 255
  - name: millicurrentsupported
    type: bool
    default: false
    advanced: true
    description:
      de: mA-Regelung unterstützt
      en: mA regulation supported
    help:
      de: Erzwingt die mA-Regelung der erweiterten Wallbe-Firmware, falls die automatische Erkennung fehlschlägt.
      en: Forces mA regulation of the extended Wallbe firmware in case autodetection fails.
render: |
  type: phoenix-ev-eth
  {{- include "modbus" . }}
  {{- if eq .millicurrentsupported "true" }}
  millicurrentsupported: true
  {{- end }}
