# https://github.com/Xtherma/xtherma_tcp
template: xtherma
products:
  - brand: Xtherma
group: heating
# requirements:
#   evcc: ["sponsorship"]
params:
  - name: modbus
    choice: ["tcpip"]
render: |
  type: heatpump
  setmaxpower:
    source: watchdog
    timeout: 120s
    reset: 0
    set:
      source: modbus
      {{- include "modbus" . | indent 4 }}
      register:
        address: 71
        type: holding
        encoding: uint16
  getmaxpower:
    source: modbus
    {{- include "modbus" . | indent 2 }}
    register:
      address: 177
      type: holding
      encoding: uint16
    scale: 10
  temp:
    source: modbus
    {{- include "modbus" . | indent 2 }}
    register:
      address: 124
      type: input
      encoding: int16
    scale: 10
  limittemp:
    source: modbus
    {{- include "modbus" . | indent 2 }}
    register:
      address: 51
      type: input
      encoding: int16
  dim:
    source: modbus
    {{- include "modbus" . | indent 2 }}
    register:
      address: 65
      type: holding
      encoding: uint16
  dimmed:
    source: modbus
    {{- include "modbus" . | indent 2 }}
    register:
      address: 103
      type: input
      encoding: uint16
