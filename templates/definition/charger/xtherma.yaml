# https://github.com/Xtherma/xtherma_tcp
template: xtherma
products:
  - brand: Xtherma
group: heating
# requirements:
#   evcc: ["sponsorship"]
params:
  - name: modbus
    choice: ["tcpip"]
render: |
  type: heatpump
  setmaxpower:
    source: modbus
    {{- include "modbus" . | indent 2 }}
    register:
      address: 71
      type: holding
      encoding: uint16
  getmaxpower:
    source: modbus
    {{- include "modbus" . | indent 2 }}
    register:
      address: 177
      type: holding
      encoding: uint16
    scale: 10
  temp:
    source: modbus
    {{- include "modbus" . | indent 2 }}
    register:
      address: 124
      type: input
      encoding: int32
    scale: 10
  limittemp:
    source: modbus
    {{- include "modbus" . | indent 2 }}
    register:
      address: 51
      type: input
      encoding: int32
