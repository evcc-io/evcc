template: ocpp-elvi
covers: ["elvi"]
products:
  - brand: EVBox
    description:
      generic: Elvi
params:
  - preset: ocpp
  - name: meter
    type: bool
    default: true
  - name: meterinterval
    deprecated: true
render: |
  {{ include "ocpp" . }}
  {{- if eq .meter "false" }}
  metervalues: Current.Offered
  {{- end }}
