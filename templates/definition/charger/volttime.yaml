template: volttime
products:
  - brand: Volt Time
    description:
      generic: Source
  - brand: Volt Time
    description:
      generic: Source 2
  - brand: Volt Time
    description:
      generic: Source 2s
  - brand: Volt Time
    description:
      generic: One
capabilities: ["meter"]
requirements:
  evcc: ["sponsorship"]
params:
  - name: token
    required: true
    help:
      de: API Token ([developer.volttime.com](https://developer.volttime.com/api-reference/authentication#personal-access-tokens))
      en: API Token ([developer.volttime.com](https://developer.volttime.com/api-reference/authentication#personal-access-tokens))
  - name: serial
    required: true
  - name: serial_number
    deprecated: true
render: |
  type: plugchoice
  token: {{ .token }}  
  identity: {{ if (or .serial .serial_number) }}VT_{{ or .serial .serial_number }}{{ end }}
  connector: 1
