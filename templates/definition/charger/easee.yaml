template: easee
products:
  - brand: Easee
    description:
      generic: Home
  - brand: Easee
    description:
      generic: Charge
  - brand: Easee
    description:
      generic: Charge Lite
  - brand: Easee
    description:
      generic: Charge Core
capabilities: ["rfid", "1p3p", "meter", "dim"]
requirements:
  evcc: ["sponsorship"]
params:
  - name: account
    description:
      de: Account Kennung
      en: Account identifier
    help:
      de: Eindeutiger Name des gespeicherten Easee Accounts (für geteilte Nutzung über mehrere Charger).
      en: Unique name of the persisted Easee account (for sharing across multiple chargers).
  - name: user
    deprecated: true
    help:
      de: Emailadresse
      en: Email address
  - name: password
    deprecated: true
    help:
      de: wie Login für Easee App oder Web Portal ([easee.cloud](https://easee.cloud))
      en: same as Easee app or the web portal ([easee.cloud](https://easee.cloud))
  - name: charger
    required: true
    description:
      de: Charger Seriennummer
      en: Charger serial number
    example: EH______
  - name: timeout
    default: 20s
    help:
      de: Spezifisches Timeout für Easee API Interaktionen. Kann Warnungen und Fehler bei träger Easee API reduzieren.
      en: Timeout specifically for Easee API interactions. Can reduce warnings and errors in case of lagging Easee API.
  - name: authorize
    type: bool
    description:
      de: Authentifizierung aktiviert
      en: Authentication enabled
    help:
      de: Steuert ob evcc die Authentifizierung am Charger vornimmt. Vorteil ist ein kontrollierter Ladestart. Nicht kompatibel mit RFID Identifikation von Fahrzeugen.
      en: Controls whether evcc shall perform authentication against charger. Benefit is a controlled start of charging. Not compatible with RFID identification of vehicles.
auth:
  type: easee
  params: [account, user, password]
render: |
  type: easee
  auth:
    source: easee
    {{- if .account }}
    account: {{ .account }}
    {{- end }}
    {{- if .user }}
    user: {{ .user }}
    {{- end }}
    {{- if .password }}
    password: {{ .password }}
    {{- end }}
  charger: {{ .charger }}
  timeout: {{ .timeout }}
  authorize: {{ .authorize }}
