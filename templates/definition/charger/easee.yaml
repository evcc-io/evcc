template: easee
products:
  - brand: Easee
    description:
      generic: Home
  - brand: Easee
    description:
      generic: Charge
  - brand: Easee
    description:
      generic: Charge Lite
  - brand: Easee
    description:
      generic: Charge Core
capabilities: ["rfid", "1p3p", "meter", "dim"]
requirements:
  evcc: ["sponsorship"]
caveats:
  - description:
      de: Seltene Energie-Updates können Ladehistorie und Sitzungsstatistik verfälschen.
      en: Infrequent energy updates can distort charging history and session statistics.
    link: https://github.com/evcc-io/evcc/issues/20594
  - description:
      de: Bei mehreren Ladepunkten in einem Easee-Circuit wirkt die Phasenumschaltung auf alle Ladepunkte.
      en: With multiple chargers in one Easee circuit, phase switching affects all of them.
    link: https://github.com/evcc-io/evcc/issues/28859
params:
  - name: user
    required: true
    service: easee/accounts
    help:
      de: E-Mail Adresse des Easee Kontos
      en: Email address of the Easee account
  - name: password
    help:
      de: wie Login für Easee App oder Web Portal ([easee.cloud](https://easee.cloud))
      en: same as Easee app or the web portal ([easee.cloud](https://easee.cloud))
  - name: charger
    required: true
    description:
      de: Charger Seriennummer
      en: Charger serial number
    example: EH______
  - name: timeout
    default: 20s
    help:
      de: Spezifisches Timeout für Easee API Interaktionen. Kann Warnungen und Fehler bei träger Easee API reduzieren.
      en: Timeout specifically for Easee API interactions. Can reduce warnings and errors in case of lagging Easee API.
  - name: authorize
    type: bool
    description:
      de: Authentifizierung aktiviert
      en: Authentication enabled
    help:
      de: Steuert ob evcc die Authentifizierung am Charger vornimmt. Vorteil ist ein kontrollierter Ladestart. Nicht kompatibel mit RFID Identifikation von Fahrzeugen.
      en: Controls whether evcc shall perform authentication against charger. Benefit is a controlled start of charging. Not compatible with RFID identification of vehicles.
auth:
  type: easee
  params: [user, password]
render: |
  type: easee
  auth:
    source: easee
    user: {{ .user }}
    {{- if .password }}
    password: {{ .password }}
    {{- end }}
  charger: {{ .charger }}
  timeout: {{ .timeout }}
  authorize: {{ .authorize }}
