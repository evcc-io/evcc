          format: date-time
        planProjectedStart:
          description: Projected start of the charging plan. Start of the earliest planned slot.
          type: string
          nullable: true
          format: date-time
        planTime:
          description: Target time of the charging plan.
          type: string
          nullable: true
          format: date-time
        priority:
          description: Priority for surplus distribution. Higher number means higher priority.
          type: number
        pvAction:
          $ref: "#/components/schemas/PvAction"
          description: Pending charge start or stop action in solar mode.
        pvRemaining:
          description: Remaining time until the pending charge start or stop action executes, in seconds.
          type: number
        last24hEnergy:
          type: number
        last7dEnergy:
          type: number
        sessionCo2PerKWh:
          description: Average CO₂ emissions of the current charging session in g/kWh.
          type: number
          nullable: true
        sessionEnergy:
          description: Energy charged in the current charging session in kWh.
          type: number
        sessionPrice:
          description: Total cost of the current charging session in the configured currency.
          type: number
          nullable: true
        sessionPricePerKWh:
          description: Average energy price of the current charging session per kWh in the configured currency.
          type: number
          nullable: true
        sessionSolarPercentage:
          description: Share of solar energy in the current charging session in %.
          type: number
        smartCostActive:
          description: Fast charging with cheap or clean grid energy is currently active.
          type: boolean
        smartCostLimit:
          description: Price or emission limit for fast charging with grid energy.
          type: number
          nullable: true
        smartCostNextStart:
          description: Start of the next fast charging period with cheap or clean grid energy.
          type: string
          nullable: true
          format: date-time
        smartFeedInPriorityActive:
          description: Charging pause for prioritized feed-in is currently active.
          type: boolean
        smartFeedInPriorityLimit:
          description: Feed-in rate limit above which charging is paused.
          type: number
          nullable: true
        smartFeedInPriorityNextStart:
          description: Start of the next charging pause for prioritized feed-in.
          type: string
          nullable: true
          format: date-time
        suggestion:
          description: Charging suggestion from the battery optimizer.
          nullable: true
          allOf:
            - $ref: "#/components/schemas/LoadpointSuggestion"
        title:
          description: Loadpoint title for UI display.
          type: string
        todayEnergy:
          type: number
        vehicleClimaterActive:
          description: Climater of the connected vehicle is active.
          type: boolean
          nullable: true
        vehicleDetectionActive:
          description: Automatic vehicle detection is running.
          type: boolean
        vehicleLimitSoc:
          description: SoC limit configured in the vehicle itself, in %.
          type: number
        vehicleName:
          description: Unique name of the connected vehicle. Empty for guest vehicles.
          type: string
        vehicleOdometer:
          description: Odometer reading of the connected vehicle in km.
          type: number
        vehicleRange:
          description: Range of the connected vehicle in km.
          type: number
        vehicleSoc:
          description: Charge level of the connected vehicle in %. Temperature in degrees for heating devices.
          type: number
        vehicleTitle:
          description: Title of the connected vehicle for UI display.
          type: string
        vehicleWelcomeActive:
          description: A short welcome charge is active to enable vehicle communication.
          type: boolean
        batteryBoostLimit:
          description: SoC limit for battery boost in %.
          type: number
        ui:
          $ref: "#/components/schemas/LoadpointUi"
          description: Display-only UI settings.
      required:
        - name
        - batteryBoost
        - chargeDuration
        - chargePower
        - chargedEnergy
        - chargerFeatureAutodetectDisabled
        - chargerFeatureAverage
        - chargerFeatureCacheable
        - chargerFeatureClimaterDisabled
        - chargerFeatureCoarseCurrent
        - chargerFeatureContinuous
        - chargerFeatureHeating
        - chargerFeatureIntegratedDevice
        - chargerFeatureOffline
        - chargerFeatureRetryable
        - chargerFeatureStreaming
        - chargerFeatureSwitchDevice
        - chargerFeatureWakeUpDisabled
        - chargerFeatureWelcomeCharge
        - chargerIcon
        - chargerPhases1p3p
        - chargerSinglePhase
        - charging
        - connected
        - connectedDuration
        - disableDelay
        - disableThreshold
        - effectiveLimitSoc
        - effectiveMaxCurrent
        - effectiveMinCurrent
        - effectiveMinSoc
        - effectivePlanId
        - effectivePlanSoc
        - effectivePlanTime
        - effectivePlanStrategy
        - effectivePriority
        - enableDelay
        - enableThreshold
        - enabled
        - limitEnergy
        - limitSoc
        - maxCurrent
        - minCurrent
        - minSoc
        - minSocNotReached
        - mode
        - offeredCurrent
        - phaseAction
        - phaseRemaining
        - phasesActive
        - phasesConfigured
        - plan
        - planActive
        - planEnergy
        - planOverrun
        - planStrategy
        - planProjectedEnd
        - planProjectedStart
        - planTime
        - priority
        - pvAction
        - pvRemaining
        - sessionCo2PerKWh
        - sessionEnergy
        - sessionPrice
        - sessionPricePerKWh
        - sessionSolarPercentage
        - smartCostActive
        - smartCostLimit
        - smartCostNextStart
        - smartFeedInPriorityActive
        - smartFeedInPriorityLimit
        - smartFeedInPriorityNextStart
        - title
        - vehicleClimaterActive
        - vehicleDetectionActive
        - vehicleLimitSoc
        - vehicleName
        - vehicleOdometer
        - vehicleRange
        - vehicleSoc
        - vehicleTitle
        - vehicleWelcomeActive
        - batteryBoostLimit
    LoadpointSuggestion:
      description: Battery optimizer suggestion for a loadpoint.
      type: object
      properties:
        action:
          description: Suggested charging action.
          type: string
          enum:
            - charge
            - stop
        charge:
          description: Recommended charge power in W.
          type: number
        discharge:
          description: Recommended discharge power in W.
          type: number
        actionable:
          description: Suggestion differs from the current operating mode.
          type: boolean
      required:
        - action
    LoadpointUi:
      description: Display-only UI settings of a loadpoint.
      type: object
      properties:
        minTemp:
          description: Lower bound of the temperature scale for heating devices, in degrees.
          type: number
        maxTemp:
          description: Upper bound of the temperature scale for heating devices, in degrees.
          type: number
      required:
        - minTemp
        - maxTemp
    MessagingEvent:
      description: A configured notification message.
      type: object
      properties:
        title:
          description: Message title template.
          type: string
        msg:
          description: Message body template.
          type: string
        disabled:
          description: Notifications for this event are disabled.
          type: boolean
      required:
        - title
        - msg
        - disabled
    MessagingEvents:
      description: Configured notification messages, keyed by event type.
      type: object
      properties:
        start:
          $ref: "#/components/schemas/MessagingEvent"
        stop:
          $ref: "#/components/schemas/MessagingEvent"
        connect:
          $ref: "#/components/schemas/MessagingEvent"
        disconnect:
          $ref: "#/components/schemas/MessagingEvent"
        soc:
          $ref: "#/components/schemas/MessagingEvent"
        guest:
          $ref: "#/components/schemas/MessagingEvent"
        asleep:
          $ref: "#/components/schemas/MessagingEvent"
        planoverrun:
          $ref: "#/components/schemas/MessagingEvent"
        suggestion:
          $ref: "#/components/schemas/MessagingEvent"
      required:
        - start
        - stop
        - connect
        - disconnect
        - soc
        - guest
        - asleep
        - planoverrun
        - suggestion
      additionalProperties: false
    Meter:
      description: Measurement data of a single meter.
      type: object
      properties:
        name:
          description: Unique device name of the meter.
          type: string
        power:
          description: Current power in W.
          type: number
        title:
          description: Meter title for UI display.
          type: string
        icon:
          description: Meter icon name for UI display.
          type: string
        energy:
          description: Total energy in kWh.
          type: number
        returnEnergy:
          description: Total exported energy in kWh.
          type: number
        powers:
          description: Power per phase in W.
          type: array
          items:
            type: number
        currents:
          description: Current per phase in A.
          type: array
          items:
            type: number
      required:
        - power
    ModbusBaudrate:
      description: Serial baud rate.
      type: number
      enum:
        - 1200
        - 9600
        - 19200
        - 38400
        - 57600
        - 115200
    ModbusComset:
      description: Serial communication parameters.
      type: string
      enum:
        - 8N1
        - "8E1"
        - 8N2
    ModbusProxy:
      description: A Modbus proxy forwarding requests to a physical device.
      type: object
      properties:
        port:
          description: Port the proxy listens on.
          type: number
        readonly:
          $ref: "#/components/schemas/ModbusProxyReadonly"
          description: How write requests are handled.
        settings:
          $ref: "#/components/schemas/ModbusProxySettings"
          description: Connection settings of the physical device.
      required:
        - port
        - readonly
        - settings
    ModbusProxyReadonly:
      description: How the Modbus proxy handles write requests.
      type: string
      enum:
        - "false"
        - "true"
        - deny
    ModbusProxySettings:
      description: Connection settings of a Modbus device.
      type: object
      properties:
        uri:
          description: Device address for TCP connections.
          type: string
        rtu:
          description: Use RTU protocol over TCP.
          type: boolean
        device:
          description: Serial device path.
          type: string
        baudrate:
          $ref: "#/components/schemas/ModbusBaudrate"
          description: Serial baud rate.
        comset:
          $ref: "#/components/schemas/ModbusComset"
          description: Serial communication parameters.
    MqttConfig:
      description: MQTT integration configuration.
      type: object
      properties:
        broker:
          description: Broker address.
          type: string
        topic:
          description: Root topic all values are published under.
          type: string
        user:
          description: Broker username.
          type: string
        password:
          description: Broker password. Redacted.
          type: string
        clientID:
          description: MQTT client id.
          type: string
        insecure:
          description: Skip TLS certificate verification.
          type: boolean
        caCert:
          description: CA certificate for TLS connections.
          type: string
        clientCert:
          description: Client certificate for TLS connections.
          type: string
        clientKey:
          description: Client key for TLS connections.
          type: string
      required:
        - broker
        - topic
    Network:
      description: Network configuration.
      type: object
      properties:
        schema:
          description: URL schema, http or https.
          type: string
        host:
          description: Hostname.
          type: string
        port:
          description: HTTP port.
          type: number
        externalUrl:
          description: Externally reachable URL.
          type: string
        internalUrl:
          description: URL in the local network.
          type: string
      required:
        - host
        - port
    Ocpp:
      description: OCPP server configuration and status.
      type: object
      properties:
        config:
          $ref: "#/components/schemas/OcppConfig"
        status:
          $ref: "#/components/schemas/OcppStatus"
      required:
        - config
        - status
    OcppConfig:
      description: OCPP server configuration.
      type: object
      properties:
        port:
          description: Port the OCPP server listens on.
          type: number
      required:
        - port
    OcppConnectionStatus:
      description: Connection status of an OCPP station.
      type: string
      enum:
        - unknown
        - configured
        - connected
    OcppForwarder:
      description: OCPP forwarder rules and upstream connection status.
      type: object
      properties:
        config:
          description: Static configuration.
          type: array
          items:
            $ref: "#/components/schemas/OcppForwarderRule"
        status:
          description: Runtime status.
          type: array
          items:
            $ref: "#/components/schemas/OcppForwarderSession"
        yamlSource:
          description: Source of the configuration, evcc.yaml file or database.
          type: string
          enum:
            - file
            - db
    OcppForwarderRule:
      description: A rule forwarding an OCPP station to an upstream backend.
      type: object
      properties:
        stationId:
          description: Station id to forward.
          type: string
        upstreamUrl:
          description: URL of the upstream OCPP backend.
          type: string
        password:
          description: Password for upstream authentication. Redacted.
          type: string
        upstreamStationId:
          description: Station id used towards the upstream backend.
          type: string
        username:
          description: Username for upstream authentication.
          type: string
        insecure:
          description: Skip TLS certificate verification.
          type: boolean
        caCert:
          description: CA certificate for TLS connections.
          type: string
        readOnly:
          description: Only forward read operations to the station.
          type: boolean
      required:
        - stationId
        - upstreamUrl
    OcppForwarderSession:
      description: Connection status of an OCPP forwarder rule.
      type: object
      properties:
        chargerId:
          description: Charger id.
          type: string
        upstreamUrl:
          description: URL of the upstream OCPP backend.
          type: string
        upstreamConnected:
          description: Connection to the upstream backend is established.
          type: boolean
        error:
          description: Last connection error.
          type: string
      required:
        - chargerId
        - upstreamUrl
        - upstreamConnected
    OcppStationStatus:
      description: Connection status of an OCPP station.
      type: object
      properties:
        id:
          description: Station id.
          type: string
        status:
          $ref: "#/components/schemas/OcppConnectionStatus"
          description: Connection status.
      required:
        - id
        - status
    OcppStatus:
      description: OCPP server status.
      type: object
      properties:
        externalUrl:
          description: Externally reachable URL of the OCPP server.
          type: string
        stations:
          description: Connection status per configured station.
          type: array
          items:
            $ref: "#/components/schemas/OcppStationStatus"
      required:
        - stations
    PhaseAction:
      description: Pending phase switching action in solar mode.
      type: string
      enum:
        - inactive
        - scale1p
        - scale3p
    PlanStrategy:
      description: Charging plan strategy.
      type: object
      properties:
        continuous:
          description: Force continuous charging without gaps.
          type: boolean
        precondition:
          description: Duration of uninterrupted charging directly before the target time, in seconds.
          type: number
      required:
        - continuous
        - precondition
    PvAction:
      description: Pending charge start or stop action in solar mode.
      type: string
      enum:
        - inactive
        - enable
        - disable
    Rate:
      description: A time slot with an associated price or emission value.
      type: object
      properties:
        start:
          description: Start of the time slot.
          type: string
          format: date-time
        end:
          description: End of the time slot.
          type: string
          format: date-time
        value:
          description: Price per kWh in the configured currency or emissions in g/kWh.
          type: number
      required:
        - start
        - end
        - value
    Remote:
      description: Remote access configuration and connection status.
      type: object
      properties:
        config:
          $ref: "#/components/schemas/RemoteConfig"
          description: Static configuration.
        status:
          $ref: "#/components/schemas/RemoteStatus"
          description: Runtime status.
        yamlSource:
          description: Source of the configuration, evcc.yaml file or database.
          type: string
          enum:
            - file
            - db
    RemoteConfig:
      description: Remote access configuration.
      type: object
      properties:
        enabled:
          description: Remote access is enabled.
          type: boolean
      required:
        - enabled
    RemoteStatus:
      description: Remote access connection status.
      type: object
      properties:
        connected:
          description: Connection to the remote access server is established.
          type: boolean
        url:
          description: Remote access URL.
          type: string
        loginBlocked:
          description: Remote login attempts are currently blocked by the rate limiter.
          type: boolean
        lastSeen:
          description: Last remote activity per client, keyed by username. RFC3339 timestamps.
          type: object
          additionalProperties:
            type: string
      required:
        - connected
        - loginBlocked
    RepeatingPlan:
      description: A repeating charging plan.
      type: object
      properties:
        weekdays:
          description: Weekdays the plan is active. 0 is Sunday, 6 is Saturday.
          type: array
          items:
            type: number
        time:
          description: Target time in HH:MM format.
          type: string
        tz:
          description: Time zone of the target time, like Europe/Berlin.
          type: string
        soc:
          description: SoC goal in %.
          type: number
        active:
          description: Plan is active.
          type: boolean
      required:
        - weekdays
        - time
        - tz
        - soc
        - active
    ShmConfig:
      description: SMA Home Manager configuration.
      type: object
      properties:
        vendorId:
          description: SMA vendor id.
          type: string
        deviceId:
          description: SMA device id.
          type: string
        deviceSerial:
          description: SMA device serial.
          type: string
      required:
        - vendorId
        - deviceId
    SmartCostType:
      description: Type of the smart charging limit.
      type: string
      enum:
        - co2
        - pricedynamic
        - priceforecast
    SolarDetails:
      description: Solar production forecast.
      type: object
      properties:
        scale:
          description: Correction factor applied to the forecast based on past production.
          type: number
        today:
          $ref: "#/components/schemas/EnergyByDay"
          description: Expected production today.
        tomorrow:
          $ref: "#/components/schemas/EnergyByDay"
          description: Expected production tomorrow.
        dayAfterTomorrow:
          $ref: "#/components/schemas/EnergyByDay"
          description: Expected production the day after tomorrow.
        timeseries:
          description: Expected production power over time.
          type: array
          items:
            $ref: "#/components/schemas/TimeseriesEntry"
    Sponsor:
      description: Sponsorship status.
      type: object
      properties:
        config:
          description: Static configuration.
        status:
          $ref: "#/components/schemas/SponsorStatus"
          description: Runtime status.
        yamlSource:
          description: Source of the configuration, evcc.yaml file or database.
          type: string
          enum:
            - file
            - db
    SponsorStatus:
      description: Sponsorship status.
      type: object
      properties:
        name:
          description: Name of the sponsor.
          type: string
        expiresAt:
          description: Expiry time of the sponsor token.
          type: string
          format: date-time
        expiresSoon:
          description: Sponsor token expires soon.
          type: boolean
        token:
          description: Sponsor token. Redacted.
          type: string
    StaticEnergyPlan:
      description: Charging plan with an energy goal.
      type: object
      properties:
        energy:
          description: Energy goal in kWh.
          type: number
        time:
          description: Target time.
          type: string
          format: date-time
      required:
        - energy
        - time
    StaticPlan:
      description: Charging plan with a fixed target time and a SoC or energy goal.
      anyOf:
        - $ref: "#/components/schemas/StaticSocPlan"
        - $ref: "#/components/schemas/StaticEnergyPlan"
    StaticSocPlan:
      description: Charging plan with a SoC goal.
      type: object
      properties:
        soc:
          description: SoC goal in %.
          type: number
        time:
          description: Target time.
          type: string
          format: date-time
      required:
        - soc
        - time
    Statistics:
      description: Charging statistics, keyed by time period.
      type: object
      properties:
        30d:
          $ref: "#/components/schemas/StatisticsData"
        365d:
          $ref: "#/components/schemas/StatisticsData"
        thisYear:
          $ref: "#/components/schemas/StatisticsData"
        total:
          $ref: "#/components/schemas/StatisticsData"
      required:
        - 30d
        - 365d
        - thisYear
        - total
    StatisticsData:
      description: Aggregated charging statistics for a time period.
      type: object
      properties:
        avgCo2:
          description: Average CO₂ emissions in g/kWh.
          type: number
        avgPrice:
          description: Average energy price per kWh in the configured currency.
          type: number
        chargedKWh:
          description: Total charged energy in kWh.
          type: number
        solarPercentage:
          description: Share of solar energy in %.
          type: number
      required:
        - avgCo2
        - avgPrice
        - chargedKWh
        - solarPercentage
    TimeseriesEntry:
      description: A forecast value at a point in time.
      type: object
      properties:
        val:
          description: Forecast power in W.
          type: number
        ts:
          description: Time of the forecast value.
          type: string
          format: date-time
      required:
        - val
        - ts
    Vehicle:
      description: A configured vehicle.
      type: object
      properties:
        name:
          description: Unique vehicle name used in API routes and configuration.
          type: string
        mode:
          description: Charge mode applied when the vehicle connects.
          anyOf:
            - $ref: "#/components/schemas/ChargeMode"
            - type: string
              enum:
                - ""
        minSoc:
          description: Minimum SoC in %. Vehicle is fast-charged until this level is reached.
          type: number
        limitSoc:
          description: SoC limit in %. Charging stops when reached.
          type: number
        plan:
          $ref: "#/components/schemas/StaticPlan"
          description: Charging plan with a fixed target time and SoC or energy goal.
        repeatingPlans:
          description: Repeating charging plans.
          type: array
          nullable: true
          items:
            $ref: "#/components/schemas/RepeatingPlan"
        planStrategy:
          $ref: "#/components/schemas/PlanStrategy"
          description: Charging plan strategy.
        title:
          description: Vehicle title for UI display.
          type: string
        features:
          description: Feature flags of the vehicle implementation.
          type: array
          items:
            type: string
        capacity:
          description: Usable battery capacity in kWh.
          type: number
        icon:
          description: Vehicle icon name for UI display.
          type: string
      required:
        - repeatingPlans
        - planStrategy
        - title
